  <!-- React 18 + Babel standalone (browser JSX transpilation) -->

  <style>
    /* ===== Design Tokens ===== */
    :root {
      --ink:       #1c1c2e;
      --ink-2:     #44445a;
      --ink-3:     #8888a8;
      --paper:     #f7f6f3;
      --paper-2:   #efede8;
      --white:     #ffffff;
      --border:    #e0ddd6;
      --accent:    #0891b2;
      --accent-dk: #0e7490;
      --shadow-sm: 0 1px 4px rgba(28,28,46,.07);
      --shadow:    0 3px 14px rgba(28,28,46,.10);
      --radius:    10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ===== TOP NAV ===== */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 62px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 28px;
      background: rgba(5, 5, 16, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-brand-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .nav-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .nav-link:hover  { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link.active { color: #fff; background: rgba(255,255,255,0.10); }

    .nav-auth {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .nav-user-name {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.65);
    }
    .nav-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      user-select: none;
    }
    .btn-logout {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255,255,255,0.48);
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,0.28); }

    #calendar-root {
      min-height: calc(100vh - 62px);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .top-nav   { gap: 16px; }
    }
    @media (max-width: 520px) {
      .top-nav { padding: 0 16px; }
      .nav-user-name { display: none; }
    }
  </style>

<body>

<!-- ===== TOP NAV ===== -->
<style>
  .btn-my-tasks {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
    line-height: 1.4;
  }
  .btn-my-tasks:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.12); }

  .nav-my-tasks { position: relative; }

  .my-tasks-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 10px);
    width: 340px;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(28,28,46,0.18);
    z-index: 9999;
    overflow: hidden;
  }
  .my-tasks-dropdown.open { display: block; }

  .mtd-header {
    padding: 11px 16px 9px;
    border-bottom: 1px solid #ece9e3;
    font-size: 0.7rem;
    font-weight: 600;
    color: #8888a8;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }

  .mtd-list { max-height: 360px; overflow-y: auto; }

  .mtd-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid #f4f1ec;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.12s;
  }
  .mtd-item:last-child { border-bottom: none; }
  .mtd-item:hover { background: #f7f6f3; }

  .mtd-task-name {
    font-size: 0.84rem;
    font-weight: 500;
    color: #1c1c2e;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mtd-board {
    font-size: 0.73rem;
    color: #8888a8;
    flex-shrink: 0;
    max-width: 84px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mtd-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .mtd-empty {
    padding: 22px 16px;
    font-size: 0.84rem;
    color: #8888a8;
    text-align: center;
  }

  .mtd-footer {
    padding: 9px 16px;
    border-top: 1px solid #ece9e3;
    text-align: center;
  }
  .mtd-footer a {
    font-size: 0.82rem;
    color: #0891b2;
    text-decoration: none;
    font-weight: 500;
  }
  .mtd-footer a:hover { text-decoration: underline; }

  /* ===== Notifications Bell ===== */
  .nav-notifications { position: relative; }

  .btn-notif {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;

    transition: background 0.2s, border-color 0.2s;
    color: rgba(255,255,255,0.7);
    flex-shrink: 0;
  }
  .btn-notif:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #fff; }

  .notif-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    min-width: 17px;
    height: 17px;
    padding: 0 4px;
    background: #ef4444;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    pointer-events: none;
  }

  .notif-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 10px);
    width: 360px;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(28,28,46,0.18);
    z-index: 9999;
    overflow: hidden;
  }

    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px 9px;
    border-bottom: 1px solid #ece9e3;
  }
  .nd-header-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: #8888a8;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }
  .nd-header-since {
    font-size: 0.68rem;
    color: #aaa9c0;
  }

  .nd-list { max-height: 380px; overflow-y: auto; }

  .nd-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid #f4f1ec;
    text-decoration: none;
    transition: background 0.12s;
  }
  .nd-item:last-child { border-bottom: none; }
  .nd-item:hover { background: #f7f6f3; }

  .nd-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .nd-icon.ic-ann  { background: #e0f2fe; color: #0891b2; }
  .nd-icon.ic-doc  { background: #f0fdf4; color: #16a34a; }
  .nd-icon.ic-msg  { background: #faf5ff; color: #7c3aed; }

  .nd-body { flex: 1; min-width: 0; }
  .nd-title {
    font-size: 0.84rem;
    font-weight: 500;
    color: #1c1c2e;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nd-meta {
    font-size: 0.72rem;
    color: #8888a8;
    margin-top: 1px;
  }

  .nd-empty {
    padding: 28px 16px;
    font-size: 0.84rem;
    color: #8888a8;
    text-align: center;
  }
  .nd-empty-icon { font-size: 1.5rem; margin-bottom: 6px; }

  /* ===== GLOBAL SEARCH ===== */
  .search-bar-wrap {
    position: relative;
    flex: 1;
    max-width: 420px;
  }
  .search-bar-input {
    width: 100%;
    height: 36px;

  .search-bar-input::placeholder { color: rgba(255,255,255,0.38); }
  .search-bar-input:focus {
    background: rgba(255,255,255,0.13);
    border-color: rgba(8,145,178,0.7);

  .search-bar-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);

  .search-bar-clear {
    position: absolute;
    right: 8px;

  .search-bar-clear.visible { display: flex; align-items: center; }

  .search-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    min-width: 480px;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 12px;
    box-shadow: 0 16px 48px rgba(28,28,46,0.22);
    z-index: 9999;
    overflow: hidden;
    display: none;
    max-height: 520px;
    overflow-y: auto;
  }
  .search-dropdown.open { display: block; }

  .search-dd-header {
    padding: 10px 16px 8px;
    border-bottom: 1px solid #f4f1ec;
    display: flex;
    align-items: center;
    justify-content: space-between;

  .search-dd-query { font-size: 0.78rem; color: #8888a8; }

  .search-result-item {
    display: flex;
    align-items: center;

    padding: 9px 16px;
    text-decoration: none;
    color: inherit;

    cursor: pointer;

  .search-result-item:hover,

  .sri-icon {

  .sri-meta {
    font-size: 0.75rem;
    color: #8888a8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .sri-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .search-dd-empty {
    padding: 32px 16px;
    text-align: center;
    color: #8888a8;
    font-size: 0.875rem;
  }
  .search-dd-empty svg { margin-bottom: 8px; opacity: 0.4; }

  .search-dd-loading {
    padding: 24px 16px;
    text-align: center;
    color: #8888a8;
    font-size: 0.855rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .search-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #e0ddd6;
    border-top-color: #0891b2;
    border-radius: 50%;
    animation: srch-spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  .search-dd-divider { height: 1px; background: #f4f1ec; margin: 2px 0; }

  .search-dd-footer {
    padding: 8px 16px;
    border-top: 1px solid #f4f1ec;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f7f6f3;
  }
  .search-dd-footer-hint {
    font-size: 0.72rem;
    color: #8888a8;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .search-kbd { display: inline-flex; align-items: center; gap: 3px; font-size: 0.68rem; color: #8888a8; }
  .search-kbd kbd {
    background: #fff;

  }

  @media (max-width: 768px) {
    .search-bar-wrap { max-width: 100%; }
    .search-dropdown { min-width: 320px; left: auto; right: 0; }
  }
</style>

<script>
  (function () {
    const aliases = {
      "academic-calendar": "academics",
      "secondary-checkpoint-pacing": "academics",
      "igcse-pacing": "academics",
      "as-alevel-pacing": "academics",
      "ease-system": "assessments",
      "school-appraisals": "appraisals",
      "teacher-appraisals": "appraisals",
      "console": "console"
    };

    const rawPath = window.location.pathname.split("/").pop() || "index";
    const page = rawPath.replace(/\.html$/i, "") || "index";
    const targetPage = aliases[page] || page || "index";

<script type="module">

  collection, getDocs, query, where

const STATUS = {
  todo:         { label: 'To Do',        color: '#6b7280', bg: '#f3f4f6' },
  in_progress:  { label: 'In Progress',  color: '#0891b2', bg: '#e0f2fe' },
  under_review: { label: 'Under Review', color: '#d97706', bg: '#fef3c7' },
  completed:    { label: 'Completed',    color: '#059669', bg: '#d1fae5' },
  on_hold:      { label: 'On Hold',      color: '#e11d48', bg: '#ffe4e6' },
};

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('authReady', async ({ detail: { user } }) => {
  const db = window.db;
  const displayName = window.userProfile?.displayName || user.displayName || '';
  const listEl = document.getElementById('myTasksList');
  const countEl = document.getElementById('myTasksCount');

  if (!displayName || !db) {
    if (listEl) listEl.innerHTML = '<p class="mtd-empty">Not signed in.</p>';
    return;
  }

  try {
    // Fetch tasks assigned to this user by display name
    const snap = await getDocs(query(
      collection(db, 'activity_tasks'),
      where('assignees', 'array-contains', displayName)
    ));
    const myTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Fetch board names
    const projectIds = [...new Set(myTasks.map(t => t.projectId).filter(Boolean))];
    const projectMap = {};
    if (projectIds.length > 0) {
      const projSnap = await getDocs(collection(db, 'activity_projects'));
      projSnap.docs.forEach(d => { projectMap[d.id] = d.data().name || ''; });
    }

    // Update count badge
    if (countEl) countEl.textContent = myTasks.length;

    // Render list
    if (!listEl) return;
    if (myTasks.length === 0) {
      listEl.innerHTML = '<p class="mtd-empty">No tasks assigned to you.</p>';
      return;
    }

    listEl.innerHTML = myTasks.map(t => {
      const st = STATUS[t.status] || { label: t.status || '—', color: '#6b7280', bg: '#f3f4f6' };
      const boardName = projectMap[t.projectId] || '';
      return `<a class="mtd-item" href="activities">
        <span class="mtd-task-name" title="${esc(t.name)}">${esc(t.name || 'Untitled')}</span>
        ${boardName ? `<span class="mtd-board" title="${esc(boardName)}">${esc(boardName)}</span>` : ''}
        <span class="mtd-badge" style="color:${st.color};background:${st.bg}">${st.label}</span>
      </a>`;
    }).join('');

  } catch (err) {
    console.error('My Tasks navbar error:', err);
    if (listEl) listEl.innerHTML = '<p class="mtd-empty">Failed to load tasks.</p>';
  }
});
</script>

<script type="module">
import {
  collection, query, where, orderBy, limit, getDocs,
  doc, updateDoc, serverTimestamp, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

function escN(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function sinceLabel(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return 'since ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

const ICONS = {
  ann: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>`,
  doc: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  msg: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
};

document.addEventListener('authReady', async ({ detail: { user } }) => {
  const db = window.db;
  const listEl = document.getElementById('notifList');
  const badgeEl = document.getElementById('notifBadge');
  const sinceEl = document.getElementById('notifSince');
  if (!db || !listEl) return;

  // Read lastLoginAt from profile (set on previous session)
  const prevLogin = window.userProfile?.lastLoginAt || null;

  // Update lastLoginAt to now for next session
  try {
    await updateDoc(doc(db, 'users', user.uid), { lastLoginAt: serverTimestamp() });
  } catch (e) {
    console.warn('Could not update lastLoginAt', e);
  }

  // If no previous login recorded, nothing to compare — show "all caught up"
  if (!prevLogin) {
    listEl.innerHTML = '<p class="nd-empty"><span class="nd-empty-icon">✓</span><br>Nothing to show yet.<br><small>Check back after your next login.</small></p>';
    return;
  }

  if (sinceEl) sinceEl.textContent = sinceLabel(prevLogin);

  try {
    const cutoff = prevLogin; // Firestore Timestamp

    // Query each collection in parallel
    const [annSnap, docSnap, msgSnap] = await Promise.all([
      getDocs(query(collection(db, 'announcements'),     where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
      getDocs(query(collection(db, 'central_documents'), where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
      getDocs(query(collection(db, 'topics'),            where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
    ]);

    const items = [
      ...annSnap.docs.map(d => ({ type: 'ann', href: 'announcements', label: 'Announcement', data: d.data() })),
      ...docSnap.docs.map(d => ({ type: 'doc', href: 'documents',     label: 'Document',     data: d.data() })),
      ...msgSnap.docs.map(d => ({ type: 'msg', href: 'messageboard',  label: 'Message',      data: d.data() })),
    ].sort((a, b) => {
      const ta = a.data.createdAt?.toMillis?.() || 0;
      const tb = b.data.createdAt?.toMillis?.() || 0;
      return tb - ta;
    });

    // Update badge
    if (badgeEl) {
      if (items.length > 0) {
        badgeEl.textContent = items.length > 99 ? '99+' : items.length;
        badgeEl.style.display = 'flex';
      } else {
        badgeEl.style.display = 'none';
      }
    }

    if (items.length === 0) {
      listEl.innerHTML = '<p class="nd-empty"><span class="nd-empty-icon">✓</span><br>You\'re all caught up!<br><small>Nothing new since your last login.</small></p>';
      return;
    }

    listEl.innerHTML = items.map(({ type, href, label, data }) => {
      const title = data.title || data.name || data.subject || 'Untitled';
      const ago = timeAgo(data.createdAt);
      return `<a class="nd-item" href="${href}">
        <span class="nd-icon ic-${type}">${ICONS[type]}</span>
        <span class="nd-body">
          <span class="nd-title" title="${escN(title)}">${escN(title)}</span>
          <span class="nd-meta">${escN(label)} · ${ago}</span>
        </span>
      </a>`;
    }).join('');

  } catch (err) {
    console.error('Notifications error:', err);
    listEl.innerHTML = '<p class="nd-empty">Could not load notifications.</p>';
  }
});
</script>

  function normalizeDate(str) {

        {children}
      </span>
    );
  }

  function LegendItem({ color, label }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: color }} />
        <span style={{ fontSize: 12, color: "#64748B", fontWeight: 500 }}>{label}</span>
      </div>
    );
  }

  const navBtnStyle = {
    padding: "8px 16px", background: "white", border: "1px solid #E2E8F0",
    borderRadius: 8, cursor: "pointer", fontWeight: 700, color: "#374151", fontSize: 13,
  };

  // ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
  function AcademicCalendar() {
    const today = new Date();
    const [currentYear,  setCurrentYear]  = useState(today.getFullYear());
    const [currentMonth, setCurrentMonth] = useState(today.getMonth());
    const [events,       setEvents]       = useState(DEMO_EVENTS);
    const [loading,      setLoading]      = useState(false);
    const [selectedEvent, setSelectedEvent] = useState(null);
    const [view, setView] = useState("month");
    const [activeFilters, setActiveFilters] = useState(new Set(["Academic", "College Counseling", "Admin/Operations"]));
    const [activeCategoryFilters, setActiveCategoryFilters] = useState(new Set(["Public Holiday", "Assessment"]));

    useEffect(() => {
      if (!SHEETS_API_URL || SHEETS_API_URL.includes("YOUR_APPS_SCRIPT")) return;
      setLoading(true);
      fetch(SHEETS_API_URL)
        .then(r => r.json())
        .then(data => {
          console.log('[Calendar] API rows:', Array.isArray(data) ? data.length : typeof data);
          console.log('[Calendar] Sample:', JSON.stringify(data?.[0]));
          if (Array.isArray(data) && data.length > 0) {
            setEvents(data.map(e => e ? { ...e, date_start: normalizeDate(e.date_start) || e.date_start, date_end: normalizeDate(e.date_end) || e.date_end } : e));
          }
          setLoading(false);
        })
        .catch(err => {
          console.error('[Calendar] Fetch error:', err);
          setLoading(false);
        });
    }, []);

    const prevMonth = () => {
      if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); }
      else setCurrentMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); }
      else setCurrentMonth(m => m + 1);
    };

    const filteredEvents = useMemo(() => events.filter(e => {
      if (!e || !e.date_start || !e.date_end) return false;
      if (CATEGORY_OVERRIDES[e.category]) return activeCategoryFilters.has(e.category);
      return activeFilters.has(e.department);
    }), [events, activeFilters, activeCategoryFilters]);

    const calendarDays = useMemo(() => {
      const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let d = 1; d <= daysInMonth; d++) days.push(d);
      return days;
    }, [currentYear, currentMonth]);

    const getEventsForDay = (day) => {
      if (!day) return [];
      const dayStr = isoDate(new Date(currentYear, currentMonth, day));
      return filteredEvents.filter(e => eventSpansDay(e, dayStr));
    };

    const upcomingEvents = useMemo(() => {
      const todayStr = isoDate(today);
      return filteredEvents
        .filter(e => e.date_start && e.date_end && String(e.date_end).slice(0, 10) >= todayStr)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)))
        .slice(0, 30);
    }, [filteredEvents]);

    const yearStats = useMemo(() => {
      const deptCount = {};
      const catCount  = {};
      let total = 0;
      events.forEach(e => {
        if (!e || !e.date_start) return;
        total++;
        deptCount[e.department] = (deptCount[e.department] || 0) + 1;
        catCount[e.category]    = (catCount[e.category]    || 0) + 1;
      });
      return { deptCount, catCount, total };
    }, [events]);

    const allEventsSorted = useMemo(() =>
      events.filter(e => e && e.date_start)
            .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start))),
    [events]);

    const toggleFilter = (key, setFn) => setFn(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });

    const isToday = (day) => {
      const t = new Date();
      return day === t.getDate() && currentMonth === t.getMonth() && currentYear === t.getFullYear();
    };

    return (
      <div style={{ fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif", background: "#F8FAFC", minHeight: "100%" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1D4ED8 100%)", padding: "28px 32px 24px", color: "white" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#93C5FD", textTransform: "uppercase", marginBottom: 4 }}>
                Eduversal Indonesia
              </div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, letterSpacing: "-0.5px" }}>
                Academic Calendar 2025–2026
              </h1>
            </div>
            {/* View Toggle */}
            <div style={{ display: "flex", gap: 6, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: 4 }}>
              {[["month", "📅 Month"], ["list", "📋 List"], ["all", "📊 All Events"]].map(([v, label]) => (
                <button key={v} onClick={() => setView(v)} style={{
                  padding: "7px 16px", borderRadius: 7, border: "none", cursor: "pointer",
                  background: view === v ? "white" : "transparent",
                  color: view === v ? "#1E3A5F" : "rgba(255,255,255,0.7)",
                  fontWeight: 700, fontSize: 13, transition: "all 0.15s",
                }}>{label}</button>
              ))}
            </div>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#CBD5E1", fontWeight: 600, marginRight: 4 }}>Filter:</span>
            {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
              <FilterChip key={key} label={cfg.label} color={cfg.color}
                active={activeFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveFilters)} />
            ))}
            {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
              <FilterChip key={key} label={key} color={cfg.color}
                active={activeCategoryFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveCategoryFilters)} />
            ))}
          </div>
        </div>

        {/* Month Navigator */}
        {view === "month" && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 32px 12px" }}>
            <button onClick={prevMonth} style={navBtnStyle}>← Prev</button>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#0F172A" }}>
                {MONTHS[currentMonth]} {currentYear}
              </div>
            </div>
            <button onClick={nextMonth} style={navBtnStyle}>Next →</button>
          </div>
        )}

        {/* Calendar Grid */}
        {view === "month" && (
          <div style={{ padding: "0 24px 32px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
              {DAYS.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: "#64748B", padding: "6px 0", letterSpacing: "0.05em" }}>
                  {d}
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
              {calendarDays.map((day, idx) => {
                const dayEvents = getEventsForDay(day);
                const today_   = isToday(day);
                return (
                  <div key={idx} style={{
                    minHeight: 90,
                    background: day ? (today_ ? "#EFF6FF" : "white") : "transparent",
                    borderRadius: 10,
                    border: day ? (today_ ? "2px solid #2563EB" : "1px solid #E2E8F0") : "none",
                    padding: day ? "8px 6px 6px" : 0,
                    cursor: dayEvents.length > 0 ? "pointer" : "default",
                  }}>
                    {day && (
                      <>
                        <div style={{
                          fontSize: 13,
                          fontWeight: today_ ? 800 : 500,
                          marginBottom: 4,
                          display: "inline-flex",
                          alignItems: "center",
                          justifyContent: "center",
                          width: today_ ? 24 : "auto",
                          height: today_ ? 24 : "auto",
                          background: today_ ? "#2563EB" : "transparent",
                          color: today_ ? "white" : "#374151",
                          borderRadius: today_ ? "50%" : 0,
                        }}>{day}</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                          {dayEvents.slice(0, 2).map(e => {
                            const style = getEventStyle(e);
                            return (
                              <div key={e.id} onClick={() => setSelectedEvent(e)} style={{
                                fontSize: 10, fontWeight: 600,
                                color: style.color, background: style.bg,
                                border: `1px solid ${style.border}`,
                                borderLeft: `3px solid ${style.dot}`,
                                borderRadius: 4, padding: "2px 4px",
                                lineHeight: 1.3, cursor: "pointer",
                                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                              }} title={e.title}>
                                {e.title}
                              </div>
                            );
                          })}
                          {dayEvents.length > 2 && (
                            <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600, paddingLeft: 2 }}>
                              +{dayEvents.length - 2} more
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* List View */}
        {view === "list" && (
          <div style={{ padding: "24px 32px", maxWidth: 780 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: "#0F172A", marginBottom: 20 }}>Upcoming Events</h2>
            {upcomingEvents.length === 0 && (
              <div style={{ color: "#94A3B8", textAlign: "center", padding: 40 }}>No events found for selected filters.</div>
            )}
            {upcomingEvents.map((e, i) => {
              const style      = getEventStyle(e);
              const ds = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(upcomingEvents[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: `1px solid #E2E8F0`, borderLeft: `4px solid ${style.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4 }}>{e.title}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={style.color} bg={style.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* All Events View */}
        {view === "all" && (
          <div style={{ padding: "28px 32px 40px", maxWidth: 960, margin: "0 auto" }}>

            {/* Stat Cards */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 14, marginBottom: 28 }}>
              <div style={{ background: "white", borderRadius: 12, padding: "20px", border: "1px solid #E2E8F0", textAlign: "center" }}>
                <div style={{ fontSize: 44, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>{yearStats.total}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", marginTop: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>Total Events</div>
              </div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
                <div key={key} style={{ background: cfg.bg, borderRadius: 12, padding: "20px", border: `1px solid ${cfg.border}`, textAlign: "center" }}>
                  <div style={{ fontSize: 44, fontWeight: 900, color: cfg.color, lineHeight: 1 }}>{yearStats.deptCount[key] || 0}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: cfg.color, marginTop: 8, opacity: 0.8, textTransform: "uppercase", letterSpacing: "0.07em" }}>{cfg.label}</div>
                </div>
              ))}
            </div>

            {/* Department Distribution Bar */}
            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 18 }}>Activity Distribution by Department</div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => {
                const count = yearStats.deptCount[key] || 0;
                const pct   = yearStats.total ? Math.round(count / yearStats.total * 100) : 0;
                return (
                  <div key={key} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: cfg.color }}>{cfg.label}</span>
                      <span style={{ fontSize: 13, color: "#64748B", fontWeight: 600 }}>{count} events &middot; {pct}%</span>
                    </div>
                    <div style={{ height: 10, background: "#F1F5F9", borderRadius: 6, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: cfg.color, borderRadius: 6 }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Category Breakdown */}
            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 28 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>Events by Category</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {Object.entries(yearStats.catCount).sort((a, b) => b[1] - a[1]).map(([cat, count]) => {
                  const override = CATEGORY_OVERRIDES[cat];
                  const color = override ? override.color : "#334155";
                  const bg    = override ? override.bg    : "#F1F5F9";
                  const border = override ? override.border : "#E2E8F0";
                  return (
                    <div key={cat} style={{ display: "flex", alignItems: "center", gap: 8, background: bg, borderRadius: 8, padding: "8px 14px", border: `1px solid ${border}` }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color }}>{cat}</span>
                      <span style={{ fontSize: 20, fontWeight: 900, color, lineHeight: 1 }}>{count}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Full Chronological List */}
            <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>
              All {yearStats.total} Events — Chronological
            </div>
            {allEventsSorted.map((e, i) => {
              const style = getEventStyle(e);
              const ds = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(allEventsSorted[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id || i}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: "1px solid #E2E8F0", borderLeft: `4px solid ${style.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center", flexShrink: 0 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4 }}>{e.title}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={style.color} bg={style.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Legend — shown only in month/list views */}
        {view !== "all" && <div style={{ padding: "0 32px 32px", display: "flex", gap: 20, flexWrap: "wrap" }}>
          {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
            <LegendItem key={key} color={cfg.color} label={cfg.label} />
          ))}
          {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
            <LegendItem key={key} color={cfg.color} label={key} />
          ))}
        </div>}

        {/* Event Modal */}
        {selectedEvent && (
          <div onClick={() => setSelectedEvent(null)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 200, backdropFilter: "blur(4px)",
          }}>
            <div onClick={ev => ev.stopPropagation()} style={{
              background: "white", borderRadius: 16, padding: 28,
              maxWidth: 420, width: "90%", boxShadow: "0 25px 60px rgba(0,0,0,0.2)",
            }}>
              {(() => {
                const style = getEventStyle(selectedEvent);
                return (
                  <>
                    <div style={{
                      height: 6, background: style.color, borderRadius: 3,
                      marginBottom: 20, marginTop: -4,
                      marginLeft: -4, marginRight: -4,
                      borderTopLeftRadius: 12, borderTopRightRadius: 12,
                    }} />
                    <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 16 }}>
                      <div style={{
                        background: style.bg, border: `1px solid ${style.border}`,
                        borderRadius: 10, padding: "10px 14px", textAlign: "center", minWidth: 60,
                      }}>
                        <div style={{ fontSize: 10, fontWeight: 800, color: style.color, textTransform: "uppercase" }}>
                          {MONTHS[parseInt(String(selectedEvent.date_start).slice(5,7))-1].slice(0,3)}
                        </div>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#0F172A" }}>
                          {String(selectedEvent.date_start).slice(8,10)}
                        </div>
                      </div>
                      <div>
                        <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#0F172A", lineHeight: 1.3 }}>
                          {selectedEvent.title}
                        </h3>
                        {selectedEvent.date_start !== selectedEvent.date_end && (
                          <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>
                            {selectedEvent.date_start} → {selectedEvent.date_end}
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                      <Tag color={style.color} bg={style.bg}>{selectedEvent.department}</Tag>
                      <Tag color="#64748B" bg="#F1F5F9">{selectedEvent.category}</Tag>
                    </div>
                    <button onClick={() => setSelectedEvent(null)} style={{
                      width: "100%", padding: "10px", background: "#F1F5F9",
                      border: "none", borderRadius: 8, cursor: "pointer",
                      fontWeight: 700, color: "#64748B", fontSize: 14,
                    }}>Close</button>
                  </>
                );
              })()}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ─── MOUNT ───────────────────────────────────────────────────────────────────
  const root = ReactDOM.createRoot(document.getElementById('calendar-root'));
  root.render(<AcademicCalendar />);
</script>

</body>
</html>
