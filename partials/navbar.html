<script>
  (function () {
    const aliases = {
      "academic-calendar": "academics",
      "secondary-checkpoint-pacing": "academics",
      "igcse-pacing": "academics",
      "as-alevel-pacing": "academics",
      "ease-system": "assessments",
      "school-appraisals": "appraisals",
      "teacher-appraisals": "appraisals",
      "console": "console"
    };

    const rawPath = window.location.pathname.split("/").pop() || "index";
    const page = rawPath.replace(/\.html$/i, "") || "index";
    const targetPage = aliases[page] || page || "index";

    document.querySelectorAll(".nav-links .nav-link").forEach((link) => {
      const linkPage = link.getAttribute("data-nav-page");
      const isConsoleLink = (link.getAttribute("href") || "").replace(/^\//, "") === "console";
      const isActive = linkPage === targetPage || (targetPage === "console" && isConsoleLink);
      link.classList.toggle("active", Boolean(isActive));
    });

    // Toggle My Tasks dropdown
    document.getElementById('myTasksBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('notifDropdown').classList.remove('open');
      document.getElementById('myTasksDropdown').classList.toggle('open');
    });

    // Toggle Notifications dropdown
    document.getElementById('notifBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('myTasksDropdown').classList.remove('open');
      document.getElementById('notifDropdown').classList.toggle('open');
    });

    // Close both dropdowns on outside click
    document.addEventListener('click', function () {
      const dd1 = document.getElementById('myTasksDropdown');
      const dd2 = document.getElementById('notifDropdown');
      if (dd1) dd1.classList.remove('open');
      if (dd2) dd2.classList.remove('open');
    });
  })();
</script>

<script type="module">
import {
  collection, getDocs, query, where
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const STATUS = {
  todo:         { label: 'To Do',        color: '#6b7280', bg: '#f3f4f6' },
  in_progress:  { label: 'In Progress',  color: '#0891b2', bg: '#e0f2fe' },
  under_review: { label: 'Under Review', color: '#d97706', bg: '#fef3c7' },
  completed:    { label: 'Completed',    color: '#059669', bg: '#d1fae5' },
  on_hold:      { label: 'On Hold',      color: '#e11d48', bg: '#ffe4e6' },
};

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('authReady', async ({ detail: { user } }) => {
  const db = window.db;
  const displayName = window.userProfile?.displayName || user.displayName || '';
  const listEl = document.getElementById('myTasksList');
  const countEl = document.getElementById('myTasksCount');

  if (!displayName || !db) {
    if (listEl) listEl.innerHTML = '<p class="mtd-empty">Not signed in.</p>';
    return;
  }

  try {
    // Fetch tasks assigned to this user by display name
    const snap = await getDocs(query(
      collection(db, 'activity_tasks'),
      where('assignees', 'array-contains', displayName)
    ));
    const myTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Fetch board names
    const projectIds = [...new Set(myTasks.map(t => t.projectId).filter(Boolean))];
    const projectMap = {};
    if (projectIds.length > 0) {
      const projSnap = await getDocs(collection(db, 'activity_projects'));
      projSnap.docs.forEach(d => { projectMap[d.id] = d.data().name || ''; });
    }

    // Update count badge
    if (countEl) countEl.textContent = myTasks.length;

    // Render list
    if (!listEl) return;
    if (myTasks.length === 0) {
      listEl.innerHTML = '<p class="mtd-empty">No tasks assigned to you.</p>';
      return;
    }

    listEl.innerHTML = myTasks.map(t => {
      const st = STATUS[t.status] || { label: t.status || '—', color: '#6b7280', bg: '#f3f4f6' };
      const boardName = projectMap[t.projectId] || '';
      return `<a class="mtd-item" href="activities">
        <span class="mtd-task-name" title="${esc(t.name)}">${esc(t.name || 'Untitled')}</span>
        ${boardName ? `<span class="mtd-board" title="${esc(boardName)}">${esc(boardName)}</span>` : ''}
        <span class="mtd-badge" style="color:${st.color};background:${st.bg}">${st.label}</span>
      </a>`;
    }).join('');

  } catch (err) {
    console.error('My Tasks navbar error:', err);
    if (listEl) listEl.innerHTML = '<p class="mtd-empty">Failed to load tasks.</p>';
  }
});
</script>

<script type="module">
import {
  collection, query, where, orderBy, limit, getDocs,
  doc, updateDoc, serverTimestamp, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

function escN(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function sinceLabel(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return 'since ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

const ICONS = {
  ann: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>`,
  doc: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  msg: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
};

document.addEventListener('authReady', async ({ detail: { user } }) => {
  const db = window.db;
  const listEl = document.getElementById('notifList');
  const badgeEl = document.getElementById('notifBadge');
  const sinceEl = document.getElementById('notifSince');
  if (!db || !listEl) return;

  // Read lastLoginAt from profile (set on previous session)
  const prevLogin = window.userProfile?.lastLoginAt || null;

  // Update lastLoginAt to now for next session
  try {
    await updateDoc(doc(db, 'users', user.uid), { lastLoginAt: serverTimestamp() });
  } catch (e) {
    console.warn('Could not update lastLoginAt', e);
  }

  // If no previous login recorded, nothing to compare — show "all caught up"
  if (!prevLogin) {
    listEl.innerHTML = '<p class="nd-empty"><span class="nd-empty-icon">✓</span><br>Nothing to show yet.<br><small>Check back after your next login.</small></p>';
    return;
  }

  if (sinceEl) sinceEl.textContent = sinceLabel(prevLogin);

  try {
    const cutoff = prevLogin; // Firestore Timestamp

    // Query each collection in parallel
    const [annSnap, docSnap, msgSnap] = await Promise.all([
      getDocs(query(collection(db, 'announcements'),     where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
      getDocs(query(collection(db, 'central_documents'), where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
      getDocs(query(collection(db, 'topics'),            where('createdAt', '>', cutoff), orderBy('createdAt', 'desc'), limit(10))),
    ]);

    const items = [
      ...annSnap.docs.map(d => ({ type: 'ann', href: 'announcements', label: 'Announcement', data: d.data() })),
      ...docSnap.docs.map(d => ({ type: 'doc', href: 'documents',     label: 'Document',     data: d.data() })),
      ...msgSnap.docs.map(d => ({ type: 'msg', href: 'messageboard',  label: 'Message',      data: d.data() })),
    ].sort((a, b) => {
      const ta = a.data.createdAt?.toMillis?.() || 0;
      const tb = b.data.createdAt?.toMillis?.() || 0;
      return tb - ta;
    });

    // Update badge
    if (badgeEl) {
      if (items.length > 0) {
        badgeEl.textContent = items.length > 99 ? '99+' : items.length;
        badgeEl.style.display = 'flex';
      } else {
        badgeEl.style.display = 'none';
      }
    }

    if (items.length === 0) {
      listEl.innerHTML = '<p class="nd-empty"><span class="nd-empty-icon">✓</span><br>You\'re all caught up!<br><small>Nothing new since your last login.</small></p>';
      return;
    }

    listEl.innerHTML = items.map(({ type, href, label, data }) => {
      const title = data.title || data.name || data.subject || 'Untitled';
      const ago = timeAgo(data.createdAt);
      return `<a class="nd-item" href="${href}">
        <span class="nd-icon ic-${type}">${ICONS[type]}</span>
        <span class="nd-body">
          <span class="nd-title" title="${escN(title)}">${escN(title)}</span>
          <span class="nd-meta">${escN(label)} · ${ago}</span>
        </span>
      </a>`;
    }).join('');

  } catch (err) {
    console.error('Notifications error:', err);
    listEl.innerHTML = '<p class="nd-empty">Could not load notifications.</p>';
  }
});
</script>
