<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Appraisals - CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1c1c2e;
      --ink-2: #44445a;
      --ink-3: #7b7b96;
      --paper: #f7f6f3;
      --paper-2: #efede8;
      --white: #ffffff;
      --border: #e0ddd6;
      --accent: #b45309;
      --accent-2: #fef3c7;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --radius: 10px;
      --shadow-sm: 0 1px 4px rgba(28, 28, 46, 0.07);
      --shadow: 0 3px 14px rgba(28, 28, 46, 0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 62px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 28px;
      background: rgba(5, 5, 16, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .nav-brand-name { font-size: 1.05rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .nav-link:hover { color: #fff; background: rgba(255, 255, 255, 0.07); }
    .nav-auth { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-user-name { font-size: 0.875rem; color: rgba(255, 255, 255, 0.65); }
    .nav-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #b45309);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      user-select: none;
    }
    .btn-logout {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.48);
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
    }

    .hero {
      background: linear-gradient(140deg, #78350f 0%, #b45309 45%, #d97706 100%);
      padding: 36px 40px;
      color: #fff;
    }
    .hero-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .hero-title {
      font-family: 'Lora', serif;
      font-size: 1.9rem;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .hero-subtitle { font-size: 0.9rem; color: rgba(255, 255, 255, 0.75); }

    .page-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 40px 64px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-2);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .badge-row { display: flex; gap: 8px; align-items: center; }
    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .badge-source { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .badge-state { background: var(--ok-bg); color: var(--ok); border-color: #86efac; }

    .toolbar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--white);
      color: var(--ink-2);
    }
    .btn:hover { background: var(--paper); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #92400e; border-color: #92400e; }
    .btn-danger { color: #dc2626; border-color: #fecaca; background: #fff1f2; }

    .content-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 22px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 1.02rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--ink);
    }
    .section-body {
      color: var(--ink-2);
      font-size: 0.9rem;
      line-height: 1.62;
      white-space: pre-wrap;
    }

    .editor-wrap {
      display: none;
      margin-top: 18px;
    }
    .editor-wrap.active { display: block; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .field label { font-size: 0.8rem; color: var(--ink-3); font-weight: 600; }
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }
    .field textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }

    .editor-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fffdfa;
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .editor-head p {
      font-size: 0.78rem;
      font-weight: 700;
      color: #9a3412;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .muted {
      font-size: 0.8rem;
      color: var(--ink-3);
    }

    .notice {
      padding: 14px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #92400e;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.86rem;
    }

    @media (max-width: 760px) {
      .page-wrap { padding: 20px 18px 44px; }
      .hero { padding: 30px 18px; }
      .hero-title { font-size: 1.55rem; }
      .nav-links { display: none; }
      .top-nav { padding: 0 14px; gap: 14px; }
      .nav-user-name { display: none; }
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Main navigation">
    <a href="index" class="nav-brand">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="6" fill="#8b5cf6"/>
        <circle cx="16" cy="4.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
        <circle cx="27.5" cy="22.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
        <circle cx="4.5" cy="22.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
      </svg>
      <span class="nav-brand-name">CentralHub</span>
    </a>

    <div class="nav-links">
      <a href="index" class="nav-link">Dashboard</a>
      <a href="appraisals" class="nav-link">Appraisals</a>
      <a href="https://teachershub.eduversal.org" class="nav-link" target="_blank" rel="noopener">Teachers Hub</a>
    </div>

    <div class="nav-auth">
      <span class="nav-user-name"></span>
      <div class="nav-avatar" id="navAvatar" aria-hidden="true"></div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <section class="hero" aria-label="School appraisal handbook header">
    <div class="hero-inner">
      <div>
        <p class="hero-subtitle">CentralHub / Appraisals</p>
        <h1 class="hero-title" id="heroTitle">School Appraisal Handbook</h1>
        <p class="hero-subtitle" id="heroSubtitle">Version 1.0 - May 2025</p>
      </div>
    </div>
  </section>

  <main class="page-wrap">
    <div class="top-actions">
      <a class="back-link" href="appraisals" aria-label="Back to Appraisals">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Appraisals
      </a>
      <div class="badge-row">
        <span class="badge badge-source" id="sourceBadge">Loading...</span>
        <span class="badge badge-state" id="saveState">Synced</span>
      </div>
    </div>

    <div class="toolbar" id="adminToolbar" style="display:none;">
      <button class="btn" id="editToggleBtn" type="button">Edit Content</button>
      <button class="btn" id="addSectionBtn" type="button" style="display:none;">Add Section</button>
      <button class="btn btn-primary" id="saveBtn" type="button" style="display:none;">Save to Firestore</button>
      <button class="btn" id="cancelBtn" type="button" style="display:none;">Cancel</button>
    </div>

    <div class="notice" id="adminNotice" style="display:none;">
      Only `central_admin` users can edit this handbook. Changes are saved to Firestore for all users.
    </div>

    <section id="viewRoot"></section>

    <section class="editor-wrap" id="editorRoot">
      <div class="content-card">
        <div class="field">
          <label for="editTitle">Main Title</label>
          <input id="editTitle" type="text" />
        </div>
        <div class="field">
          <label for="editSubtitle">Subtitle</label>
          <input id="editSubtitle" type="text" />
        </div>
      </div>
      <div id="sectionEditorList"></div>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module" src="auth-guard.js"></script>

  <script type="module">
    import { doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const DOC_PATH = ["school_appraisals", "main_handbook"];

    const DEFAULT_DATA = {
      title: "School Appraisal Handbook",
      subtitle: "Version 1.0 - May 2025",
      sections: [
        {
          id: "introduction",
          title: "Introduction",
          content: "Purpose of the school appraisal system\nThe school appraisal system serves as a comprehensive framework for evaluating and enhancing the quality of education. It is designed to assess strengths, identify improvement areas, and guide school-wide development with evidence-based decisions."
        },
        {
          id: "process-overview",
          title: "Overview of the Appraisal Process",
          content: "The process follows a cyclical approach:\n- Self-assessment and evidence gathering\n- External evaluation by Eduversal team\n- Feedback and action planning\n- Implementation and monitoring\n- Continuous improvement\n\nSchools are expected to keep evidence organized and accessible in online storage for retrieval during appraisal visits."
        },
        {
          id: "stakeholders",
          title: "Key Stakeholders and Their Roles",
          content: "- School administrators: leadership, resourcing, and oversight\n- Teachers: self-assessment, peer observations, implementation of strategies\n- Students: feedback on learning experience and environment\n- Parents: perspective on communication and school-community responsiveness\n- External evaluators: objective validation and recommendations"
        },
        {
          id: "references",
          title: "International References",
          content: "This framework references international accreditation practices, including:\n- CIS (Council of International Schools)\n- NEASC (New England Association of Schools and Colleges)\n- WASC (Western Association of Schools and Colleges)\n\nThe intent is alignment with high international standards and continuous quality improvement."
        },
        {
          id: "domain-1",
          title: "Domain 1: School Development",
          content: "Focus: mission and vision alignment, school development goals, leadership team setup, and use of PIE model.\n\nExpected evidence examples:\n- School development goals\n- Strategic growth plan\n- SMART goals\n- Leadership team list and job descriptions\n- Action-planning evidence and feasibility records"
        },
        {
          id: "domain-2",
          title: "Domain 2: School Management and Leadership",
          content: "Focus: organizational structure, communication quality, leadership responsibilities, school culture, safeguarding, and governance.\n\nExpected evidence examples:\n- School organizational chart\n- Staff and parent-student handbooks\n- Curriculum documentation and academic calendar\n- KPI system and leadership evaluation reports\n- Safeguarding policy, emergency/crisis plan, legal compliance documents"
        },
        {
          id: "domain-3",
          title: "Domain 3: Subject Departments Structure and Professional Development",
          content: "Focus: department organization, quality of meetings, teacher self-assessment, observations, mentoring, peer observation, and PD impact.\n\nExpected evidence examples:\n- Department member lists and minutes\n- HoD coordination meeting minutes\n- Teacher development files (self-evaluation, goals, action plans)\n- Edunav appraisal records and walkthrough logs\n- Mentor-mentee logs and PD impact reports"
        },
        {
          id: "domain-4",
          title: "Domain 4: Olympiad and Educational Technology",
          content: "Focus: olympiad program quality, student follow-up, wellbeing management, LMS usage, classroom technology integration, and digital policy maturity.\n\nExpected evidence examples:\n- Olympiad handbook, competition and achievement lists\n- Tutor plans and student performance follow-up reports\n- LMS analytics, course content, user training records\n- Technology inventory and teacher training documents\n- Digital policy and digital citizenship program evidence"
        },
        {
          id: "domain-5",
          title: "Domain 5: Curriculum, Teaching, and Assessment",
          content: "Focus: lesson planning quality, assessment methods, student understanding, achievement data, teacher evaluation, learning support, and inclusive practice.\n\nExpected evidence examples:\n- Lesson and unit plans\n- Assessment policy and analyzed assessment data\n- Student portfolio and progress dashboards\n- Teacher PD participation and peer review outputs\n- Support plans for advanced students, language learners, and students with difficulties"
        },
        {
          id: "evidence-collection",
          title: "Evidence Collection and Evaluation",
          content: "Accepted evidence types:\n- Documentary\n- Quantitative data\n- Qualitative data\n- Visual evidence\n\nCollection methods:\n- Document review\n- Observations and walkthroughs\n- Surveys and questionnaires\n- Interviews\n- Data analysis\n\nEvaluation criteria include alignment with school goals, effectiveness, quality, relevance, and sustainability."
        },
        {
          id: "reporting-feedback",
          title: "Reporting, Feedback, and Follow-up",
          content: "The appraisal report should clearly summarize strengths, improvement areas, commendations, and actionable recommendations.\n\nFeedback mechanisms:\n- Written feedback (formal report)\n- Oral feedback (exit conference)\n- Individual feedback to teachers/staff\n- Online stakeholder feedback\n\nEach school is expected to produce an action plan with goals, timelines, owners, and monitoring approach."
        },
        {
          id: "continuous-improvement",
          title: "Continuous Improvement",
          content: "The appraisal system itself should be periodically reviewed through stakeholder feedback, data trend analysis, and benchmarked best practices.\n\nAppendix references:\n- EDUNAV School Appraisal System Report\n- KPI Instruments\n- Parent Survey: https://forms.gle/eyoBqpHbnyxLktmo6\n- Student Survey: https://forms.gle/n5W1eAiH749rWYr26"
        }
      ]
    };

    const state = {
      data: structuredClone(DEFAULT_DATA),
      originalData: structuredClone(DEFAULT_DATA),
      editMode: false,
      source: "default",
      isAdmin: false,
      unsubscribe: null
    };

    const el = {
      heroTitle: document.getElementById("heroTitle"),
      heroSubtitle: document.getElementById("heroSubtitle"),
      sourceBadge: document.getElementById("sourceBadge"),
      saveState: document.getElementById("saveState"),
      viewRoot: document.getElementById("viewRoot"),
      editorRoot: document.getElementById("editorRoot"),
      sectionEditorList: document.getElementById("sectionEditorList"),
      editTitle: document.getElementById("editTitle"),
      editSubtitle: document.getElementById("editSubtitle"),
      adminToolbar: document.getElementById("adminToolbar"),
      adminNotice: document.getElementById("adminNotice"),
      editToggleBtn: document.getElementById("editToggleBtn"),
      addSectionBtn: document.getElementById("addSectionBtn"),
      saveBtn: document.getElementById("saveBtn"),
      cancelBtn: document.getElementById("cancelBtn")
    };

    function normalizeData(raw) {
      const sections = Array.isArray(raw?.sections) ? raw.sections : [];
      return {
        title: String(raw?.title || DEFAULT_DATA.title),
        subtitle: String(raw?.subtitle || DEFAULT_DATA.subtitle),
        sections: sections.map((section, idx) => ({
          id: String(section?.id || `section_${idx + 1}`),
          title: String(section?.title || `Section ${idx + 1}`),
          content: String(section?.content || "")
        }))
      };
    }

    function renderView() {
      el.heroTitle.textContent = state.data.title;
      el.heroSubtitle.textContent = state.data.subtitle;
      el.sourceBadge.textContent = state.source === "firestore" ? "Source: Firestore" : "Source: Default seed";

      el.viewRoot.innerHTML = "";
      state.data.sections.forEach(section => {
        const card = document.createElement("article");
        card.className = "content-card";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = section.title;

        const body = document.createElement("div");
        body.className = "section-body";
        body.textContent = section.content;

        card.appendChild(title);
        card.appendChild(body);
        el.viewRoot.appendChild(card);
      });
    }

    function renderEditorSections() {
      el.sectionEditorList.innerHTML = "";
      state.data.sections.forEach((section, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "editor-section";

        const head = document.createElement("div");
        head.className = "editor-head";

        const label = document.createElement("p");
        label.textContent = `Section ${idx + 1}`;

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn btn-danger";
        removeBtn.textContent = "Remove";
        removeBtn.addEventListener("click", () => {
          state.data.sections.splice(idx, 1);
          renderEditorSections();
        });

        head.appendChild(label);
        head.appendChild(removeBtn);

        const titleField = document.createElement("div");
        titleField.className = "field";
        titleField.innerHTML = `<label>Section Title</label><input type=\"text\" value=\"${escapeHtml(section.title)}\" />`;
        const titleInput = titleField.querySelector("input");
        titleInput.addEventListener("input", (event) => {
          state.data.sections[idx].title = event.target.value;
        });

        const bodyField = document.createElement("div");
        bodyField.className = "field";
        bodyField.innerHTML = `<label>Section Content</label><textarea>${escapeHtml(section.content)}</textarea>`;
        const bodyInput = bodyField.querySelector("textarea");
        bodyInput.addEventListener("input", (event) => {
          state.data.sections[idx].content = event.target.value;
        });

        wrap.appendChild(head);
        wrap.appendChild(titleField);
        wrap.appendChild(bodyField);

        el.sectionEditorList.appendChild(wrap);
      });
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function enterEditMode() {
      if (!state.isAdmin) return;
      state.editMode = true;
      el.editorRoot.classList.add("active");
      el.addSectionBtn.style.display = "inline-flex";
      el.saveBtn.style.display = "inline-flex";
      el.cancelBtn.style.display = "inline-flex";
      el.editToggleBtn.style.display = "none";
      el.editTitle.value = state.data.title;
      el.editSubtitle.value = state.data.subtitle;
      renderEditorSections();
      el.saveState.textContent = "Editing";
    }

    function exitEditMode() {
      state.editMode = false;
      el.editorRoot.classList.remove("active");
      el.addSectionBtn.style.display = "none";
      el.saveBtn.style.display = "none";
      el.cancelBtn.style.display = "none";
      el.editToggleBtn.style.display = "inline-flex";
      state.data = structuredClone(state.originalData);
      renderView();
      el.saveState.textContent = "Synced";
    }

    async function saveChanges() {
      if (!state.isAdmin) return;
      state.data.title = el.editTitle.value.trim() || DEFAULT_DATA.title;
      state.data.subtitle = el.editSubtitle.value.trim() || DEFAULT_DATA.subtitle;

      state.data.sections = state.data.sections
        .map((section, idx) => ({
          id: section.id || `section_${idx + 1}`,
          title: (section.title || "").trim() || `Section ${idx + 1}`,
          content: (section.content || "").trim()
        }))
        .filter(section => section.title || section.content);

      if (!state.data.sections.length) {
        alert("At least one section is required.");
        return;
      }

      const db = window.db;
      const ref = doc(db, ...DOC_PATH);

      el.saveBtn.disabled = true;
      el.saveBtn.textContent = "Saving...";
      el.saveState.textContent = "Saving";

      try {
        await setDoc(ref, {
          ...state.data,
          updatedAt: serverTimestamp(),
          updatedByUid: window.currentUser?.uid || null,
          updatedByEmail: window.currentUser?.email || null
        }, { merge: true });

        state.source = "firestore";
        state.originalData = structuredClone(state.data);
        renderView();
        el.saveState.textContent = "Saved";
      } catch (error) {
        console.error("Failed to save handbook", error);
        alert("Failed to save content to Firestore. Check permissions.");
        el.saveState.textContent = "Save failed";
      } finally {
        el.saveBtn.disabled = false;
        el.saveBtn.textContent = "Save to Firestore";
      }
    }

    function wireEvents() {
      el.editToggleBtn.addEventListener("click", enterEditMode);
      el.cancelBtn.addEventListener("click", exitEditMode);
      el.saveBtn.addEventListener("click", saveChanges);
      el.addSectionBtn.addEventListener("click", () => {
        state.data.sections.push({
          id: `section_${Date.now()}`,
          title: "New Section",
          content: ""
        });
        renderEditorSections();
      });

      el.editTitle.addEventListener("input", (event) => {
        state.data.title = event.target.value;
      });
      el.editSubtitle.addEventListener("input", (event) => {
        state.data.subtitle = event.target.value;
      });
    }

    document.addEventListener("authReady", ({ detail: { profile } }) => {
      state.isAdmin = profile?.role === "central_admin";
      if (state.isAdmin) {
        el.adminToolbar.style.display = "flex";
      } else {
        el.adminNotice.style.display = "block";
      }

      wireEvents();

      const ref = doc(window.db, ...DOC_PATH);
      state.unsubscribe = onSnapshot(ref, (snapshot) => {
        if (snapshot.exists()) {
          state.source = "firestore";
          state.data = normalizeData(snapshot.data());
        } else {
          state.source = "default";
          state.data = structuredClone(DEFAULT_DATA);
        }

        state.originalData = structuredClone(state.data);

        if (!state.editMode) {
          renderView();
        } else {
          el.editTitle.value = state.data.title;
          el.editSubtitle.value = state.data.subtitle;
          renderEditorSections();
        }

        el.saveState.textContent = "Synced";
      }, (error) => {
        console.error("Failed to read handbook", error);
        el.saveState.textContent = "Read failed";
        state.source = "default";
        state.data = structuredClone(DEFAULT_DATA);
        state.originalData = structuredClone(state.data);
        renderView();
      });

      renderView();
    });

    window.addEventListener("beforeunload", () => {
      if (typeof state.unsubscribe === "function") {
        state.unsubscribe();
      }
    });
  </script>
</body>
</html>
