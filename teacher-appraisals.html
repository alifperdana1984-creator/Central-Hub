<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Appraisals - CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1b2438;
      --ink-2: #3f4d66;
      --ink-3: #7382a1;
      --paper: #f4f6fa;
      --white: #ffffff;
      --border: #dbe3f0;
      --accent: #1d4ed8;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --radius: 10px;
      --shadow-sm: 0 1px 4px rgba(16, 24, 40, 0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    .top-nav {
      position: sticky; top: 0; z-index: 50; height: 62px; padding: 0 28px;
      display: flex; align-items: center; gap: 28px;
      background: rgba(5, 5, 16, 0.95); border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .nav-brand-name { font-size: 1.05rem; font-weight: 600; color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-auth { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-user-name { font-size: 0.875rem; color: rgba(255,255,255,0.65); }
    .nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff;
    }
    .btn-logout {
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
      color: rgba(255,255,255,0.48); background: none;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 5px 12px;
      cursor: pointer;
    }

    .hero { background: linear-gradient(140deg, #1e3a8a 0%, #1d4ed8 45%, #3b82f6 100%); padding: 36px 40px; color: #fff; }
    .hero-inner { max-width: 1120px; margin: 0 auto; }
    .hero-title { font-family: 'Lora', serif; font-size: 1.9rem; line-height: 1.2; margin-bottom: 6px; }
    .hero-subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.78); }

    .page-wrap { max-width: 1120px; margin: 0 auto; padding: 28px 40px 64px; }
    .top-actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-2); text-decoration: none; font-size: 0.88rem; font-weight: 500; }
    .badge-row { display: flex; gap: 8px; align-items: center; }
    .badge { font-size: 0.75rem; font-weight: 600; padding: 4px 9px; border-radius: 999px; border: 1px solid transparent; }
    .badge-source { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .badge-state { background: var(--ok-bg); color: var(--ok); border-color: #86efac; }

    .toolbar {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 12px; margin-bottom: 16px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
      font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600;
      cursor: pointer; background: var(--white); color: var(--ink-2);
    }
    .btn:hover { background: #f8fbff; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1e40af; border-color: #1e40af; }

    .notice { padding: 14px; border: 1px solid #bfdbfe; background: #eff6ff; color: #1d4ed8; border-radius: 8px; margin-bottom: 12px; font-size: 0.86rem; }
    .content-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 22px; margin-bottom: 14px; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .section-title { font-size: 1.02rem; font-weight: 600; margin-bottom: 10px; color: var(--ink); }
    .section-body { color: var(--ink-2); font-size: 0.9rem; line-height: 1.62; white-space: pre-wrap; }
    .image-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .image-item {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      min-height: 120px;
    }
    .image-item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    .image-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      border: 1px solid #fecaca;
      background: rgba(255, 241, 242, 0.95);
      color: #dc2626;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .image-add {
      margin-top: 10px;
      display: none;
      border: 1px dashed #3b82f6;
      color: #1d4ed8;
      background: #eff6ff;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }

    [contenteditable="true"] { outline: 2px dashed #3b82f6; outline-offset: 2px; border-radius: 6px; padding: 2px 4px; background: #f8fbff; }
    .btn-remove {
      display: none; border: 1px solid #fecaca; background: #fff1f2; color: #dc2626;
      border-radius: 7px; padding: 5px 9px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
      flex-shrink: 0;
    }

    @media (max-width: 760px) {
      .page-wrap { padding: 20px 18px 44px; }
      .hero { padding: 30px 18px; }
      .hero-title { font-size: 1.55rem; }
      .nav-links { display: none; }
      .top-nav { padding: 0 14px; gap: 14px; }
      .nav-user-name { display: none; }
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Main navigation">
    <a href="index" class="nav-brand">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="6" fill="#8b5cf6"/>
        <circle cx="16" cy="4.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
        <circle cx="27.5" cy="22.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
        <circle cx="4.5" cy="22.5" r="3.2" fill="#6d28d9" opacity="0.9"/>
      </svg>
      <span class="nav-brand-name">CentralHub</span>
    </a>
    <div class="nav-links">
      <a href="index" class="nav-link">Dashboard</a>
      <a href="appraisals" class="nav-link">Appraisals</a>
      <a href="https://teachershub.eduversal.org" class="nav-link" target="_blank" rel="noopener">Teachers Hub</a>
    </div>
    <div class="nav-auth">
      <span class="nav-user-name"></span>
      <div class="nav-avatar" id="navAvatar" aria-hidden="true"></div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <section class="hero" aria-label="Teacher appraisal handbook header">
    <div class="hero-inner">
      <p class="hero-subtitle">CentralHub / Appraisals</p>
      <h1 class="hero-title" id="heroTitle">Teacher Appraisal Handbook</h1>
      <p class="hero-subtitle" id="heroSubtitle">2025-2026</p>
    </div>
  </section>

  <main class="page-wrap">
    <div class="top-actions">
      <a class="back-link" href="appraisals" aria-label="Back to Appraisals">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Appraisals
      </a>
      <div class="badge-row">
        <span class="badge badge-source" id="sourceBadge">Loading...</span>
        <span class="badge badge-state" id="saveState">Synced</span>
      </div>
    </div>

    <div class="toolbar" id="adminToolbar" style="display:none;">
      <button class="btn" id="editToggleBtn" type="button">Edit Content</button>
      <button class="btn" id="addSectionBtn" type="button" style="display:none;">Add Section</button>
      <button class="btn btn-primary" id="saveBtn" type="button" style="display:none;">Save to Firestore</button>
      <button class="btn" id="cancelBtn" type="button" style="display:none;">Cancel</button>
    </div>

    <div class="notice" id="adminNotice" style="display:none;">Only `central_admin` users can edit this handbook. Changes are saved to Firestore for all users.</div>
    <section id="viewRoot"></section>
    <input id="imageUploadInput" type="file" accept="image/*" style="display:none;" />
  </main>

  <script src="firebase-config.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import { doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const DOC_PATH = ["teacher_appraisals", "main_handbook"];
    const DEFAULT_DATA = {
      title: "Teacher Appraisal Handbook",
      subtitle: "2025-2026",
      sections: [
        { id: "background", title: "Background", content: "Teacher appraisal and feedback are central to improving schools and student learning outcomes. A well-designed system supports professional learning, recognizes effective teaching, and strengthens school organization through objective evaluation and growth planning.\n\nThis framework classifies teacher duties into core areas: subject knowledge, instructional competence, assessment competence, professionalism, and wider duties to the school community." },
        { id: "cycle", title: "Appraisal Cycle", content: "1. Orientation\n2. Data Collection (Appraisal Visit): administration, class observation, teacher work inspection, student satisfaction survey\n3. Post-Appraisal Conferences\n4. Publication of Final Scores\n5. Summary Report\n6. Follow-Through and Performance Planning\n\nThe cycle is designed to provide evidence-based feedback and continuous support throughout the school year." },
        { id: "orientation", title: "Orientation and Pre-Conference", content: "At the beginning of each academic year, Eduversal socializes the appraisal system with school management. Schools then orient all teachers on rubric expectations and implementation details.\n\nBefore each observation, the appraiser (typically Head of Department) conducts a pre-conference to discuss lesson context, student profile, lesson objectives, and planned strategies." },
        { id: "data-collection", title: "Data Collection During Appraisal Visit", content: "Data sources include:\n- Teacher administration documents\n- Classroom observations using rubric domains\n- Teacher work and professionalism evidence across the year\n- Student satisfaction surveys at semester end\n\nAppraisers provide written evidence and formative feedback through Edunav and post-observation conferences." },
        { id: "roles", title: "Roles and Responsibilities", content: "Eduversal:\n- Set standards and school objectives for each appraisal period\n- Publish appraisal process documents\n- Provide written appraisal reports\n\nSchool Management:\n- Inform teachers about standards and objectives\n- Conduct appraisals and identify development needs\n- Provide written appraisal reports\n\nAppraiser (HoD):\n- Review job descriptions and prior records\n- Gather/share evidence, conduct conferences, and document outcomes\n- Monitor progress and support development\n\nAppraisee (Teacher/Staff):\n- Complete self-review and discuss progress\n- Agree success criteria and evidence\n- Participate in interim progress reviews and development actions" },
        { id: "frameworks", title: "Teacher Appraisal Frameworks, Instruments, and Rubrics", content: "Primary framework instruments include:\n- Teacher Administration\n- Class Observation\n- Teacher Work Inspection\n- Student Satisfaction Survey\n\nClass observation rubric domains include planning and preparation, classroom environment, instruction, and professional responsibilities. Performance is interpreted with four rubric levels: Unsatisfactory, Basic, Proficient, Distinguished." },
        { id: "reporting", title: "Reporting and Final Scores", content: "Final scores are published through Edunav. Teachers receive individual reports, while schools receive summary reports at the end of the academic year.\n\nThe summary report closes the annual cycle and informs interim review meetings (including mid-year review) for ongoing performance development." },
        { id: "development", title: "Follow-Through and Performance Planning", content: "Appraisal outcomes should directly inform professional development planning. Schools are expected to build a culture where teachers take responsibility for improving practice through targeted support and training linked to school priorities and individual goals." },
        { id: "appendix", title: "Edunav Implementation Notes", content: "Evidence collection, rubric scoring, appraisal statements, and feedback records should be maintained consistently in Edunav to ensure transparency, continuity, and institutional memory across appraisal cycles." }
      ]
    };

    const state = { data: structuredClone(DEFAULT_DATA), originalData: structuredClone(DEFAULT_DATA), editMode: false, source: "default", isAdmin: false, unsub: null, pendingImageSection: null };
    const el = {
      heroTitle: document.getElementById("heroTitle"),
      heroSubtitle: document.getElementById("heroSubtitle"),
      sourceBadge: document.getElementById("sourceBadge"),
      saveState: document.getElementById("saveState"),
      viewRoot: document.getElementById("viewRoot"),
      adminToolbar: document.getElementById("adminToolbar"),
      adminNotice: document.getElementById("adminNotice"),
      editToggleBtn: document.getElementById("editToggleBtn"),
      addSectionBtn: document.getElementById("addSectionBtn"),
      saveBtn: document.getElementById("saveBtn"),
      cancelBtn: document.getElementById("cancelBtn"),
      imageUploadInput: document.getElementById("imageUploadInput")
    };

    function normalizeData(raw) {
      const sections = Array.isArray(raw?.sections) ? raw.sections : [];
      return {
        title: String(raw?.title || DEFAULT_DATA.title),
        subtitle: String(raw?.subtitle || DEFAULT_DATA.subtitle),
        sections: sections.map((s, idx) => ({
          id: String(s?.id || `section_${idx+1}`),
          title: String(s?.title || `Section ${idx+1}`),
          content: String(s?.content || ""),
          images: Array.isArray(s?.images) ? s.images
            .filter(img => img && typeof img.url === "string")
            .map(img => ({ url: String(img.url), path: String(img.path || ""), name: String(img.name || "") }))
            : []
        }))
      };
    }

    function setEditable(on) {
      el.heroTitle.contentEditable = on ? "true" : "false";
      el.heroSubtitle.contentEditable = on ? "true" : "false";
      el.viewRoot.querySelectorAll("[data-editable='true']").forEach(node => {
        node.contentEditable = on ? "true" : "false";
      });
      el.viewRoot.querySelectorAll(".btn-remove").forEach(btn => {
        btn.style.display = on ? "inline-flex" : "none";
      });
      el.viewRoot.querySelectorAll(".image-add").forEach(btn => {
        btn.style.display = on ? "inline-flex" : "none";
      });
      el.viewRoot.querySelectorAll(".image-remove").forEach(btn => {
        btn.style.display = on ? "inline-flex" : "none";
      });
    }

    function renderView() {
      el.heroTitle.textContent = state.data.title;
      el.heroSubtitle.textContent = state.data.subtitle;
      el.sourceBadge.textContent = state.source === "firestore" ? "Source: Firestore" : "Source: Default seed";
      el.viewRoot.innerHTML = "";

      state.data.sections.forEach((section, idx) => {
        const card = document.createElement("article");
        card.className = "content-card";

        const head = document.createElement("div");
        head.className = "card-head";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.dataset.editable = "true";
        title.dataset.field = "title";
        title.dataset.index = String(idx);
        title.textContent = section.title;

        const removeBtn = document.createElement("button");
        removeBtn.className = "btn-remove";
        removeBtn.type = "button";
        removeBtn.dataset.removeIndex = String(idx);
        removeBtn.textContent = "Remove";

        const body = document.createElement("div");
        body.className = "section-body";
        body.dataset.editable = "true";
        body.dataset.field = "content";
        body.dataset.index = String(idx);
        body.textContent = section.content;

        const imageGrid = document.createElement("div");
        imageGrid.className = "image-grid";
        (section.images || []).forEach((img, imageIndex) => {
          const item = document.createElement("div");
          item.className = "image-item";

          const a = document.createElement("a");
          a.href = img.url;
          a.target = "_blank";
          a.rel = "noopener";

          const image = document.createElement("img");
          image.src = img.url;
          image.alt = img.name || `Section image ${imageIndex + 1}`;
          a.appendChild(image);

          const removeImageBtn = document.createElement("button");
          removeImageBtn.type = "button";
          removeImageBtn.className = "image-remove";
          removeImageBtn.dataset.sectionIndex = String(idx);
          removeImageBtn.dataset.imageIndex = String(imageIndex);
          removeImageBtn.textContent = "Remove";

          item.appendChild(a);
          item.appendChild(removeImageBtn);
          imageGrid.appendChild(item);
        });

        const addImageBtn = document.createElement("button");
        addImageBtn.type = "button";
        addImageBtn.className = "image-add";
        addImageBtn.dataset.addImageSection = String(idx);
        addImageBtn.textContent = "Add image";

        head.appendChild(title);
        head.appendChild(removeBtn);
        card.appendChild(head);
        card.appendChild(body);
        card.appendChild(imageGrid);
        card.appendChild(addImageBtn);
        el.viewRoot.appendChild(card);
      });

      setEditable(state.editMode && state.isAdmin);
    }

    function enterEditMode() {
      if (!state.isAdmin) return;
      state.editMode = true;
      el.editToggleBtn.style.display = "none";
      el.addSectionBtn.style.display = "inline-flex";
      el.saveBtn.style.display = "inline-flex";
      el.cancelBtn.style.display = "inline-flex";
      el.saveState.textContent = "Editing";
      setEditable(true);
    }

    function exitEditMode() {
      state.editMode = false;
      state.data = structuredClone(state.originalData);
      el.editToggleBtn.style.display = "inline-flex";
      el.addSectionBtn.style.display = "none";
      el.saveBtn.style.display = "none";
      el.cancelBtn.style.display = "none";
      el.saveState.textContent = "Synced";
      renderView();
    }

    function sanitizeData() {
      state.data.title = (state.data.title || "").trim() || DEFAULT_DATA.title;
      state.data.subtitle = (state.data.subtitle || "").trim() || DEFAULT_DATA.subtitle;
      state.data.sections = state.data.sections
        .map((s, idx) => ({
          id: s.id || `section_${idx+1}`,
          title: (s.title || "").trim() || `Section ${idx+1}`,
          content: (s.content || "").trim(),
          images: Array.isArray(s.images) ? s.images
            .filter(img => img && typeof img.url === "string" && img.url.trim())
            .map(img => ({ url: img.url.trim(), path: String(img.path || ""), name: String(img.name || "") }))
            : []
        }))
        .filter(s => s.title || s.content);
    }

    async function uploadImageToSection(sectionIndex, file) {
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const path = `handbook_uploads/teacher_appraisals/main_handbook/${Date.now()}_${safeName}`;
      const storage = getStorage(window.firebaseApp);
      const fileRef = storageRef(storage, path);
      await uploadBytes(fileRef, file);
      const url = await getDownloadURL(fileRef);
      if (!state.data.sections[sectionIndex].images) state.data.sections[sectionIndex].images = [];
      state.data.sections[sectionIndex].images.push({ url, path, name: file.name });
    }

    async function tryDeleteImageFromStorage(image) {
      if (!image?.path) return;
      try {
        const storage = getStorage(window.firebaseApp);
        await deleteObject(storageRef(storage, image.path));
      } catch (error) {
        console.warn("Image file delete skipped/failed:", error);
      }
    }

    async function saveChanges() {
      if (!state.isAdmin) return;
      sanitizeData();
      if (!state.data.sections.length) {
        alert("At least one section is required.");
        return;
      }

      el.saveBtn.disabled = true;
      el.saveBtn.textContent = "Saving...";
      el.saveState.textContent = "Saving";
      try {
        await setDoc(doc(window.db, ...DOC_PATH), {
          ...state.data,
          updatedAt: serverTimestamp(),
          updatedByUid: window.currentUser?.uid || null,
          updatedByEmail: window.currentUser?.email || null
        }, { merge: true });
        state.source = "firestore";
        state.originalData = structuredClone(state.data);
        state.editMode = false;
        el.editToggleBtn.style.display = "inline-flex";
        el.addSectionBtn.style.display = "none";
        el.saveBtn.style.display = "none";
        el.cancelBtn.style.display = "none";
        el.saveState.textContent = "Saved";
        renderView();
      } catch (error) {
        console.error("Failed to save handbook", error);
        alert("Failed to save content to Firestore. Check permissions.");
        el.saveState.textContent = "Save failed";
      } finally {
        el.saveBtn.disabled = false;
        el.saveBtn.textContent = "Save to Firestore";
      }
    }

    function wireEvents() {
      el.editToggleBtn.addEventListener("click", enterEditMode);
      el.cancelBtn.addEventListener("click", exitEditMode);
      el.saveBtn.addEventListener("click", saveChanges);
      el.addSectionBtn.addEventListener("click", () => {
        state.data.sections.push({ id: `section_${Date.now()}`, title: "New Section", content: "", images: [] });
        renderView();
      });

      el.heroTitle.addEventListener("input", () => { if (state.editMode) state.data.title = el.heroTitle.innerText; });
      el.heroSubtitle.addEventListener("input", () => { if (state.editMode) state.data.subtitle = el.heroSubtitle.innerText; });

      el.viewRoot.addEventListener("input", (event) => {
        if (!state.editMode) return;
        const target = event.target;
        const idx = Number(target.dataset.index);
        const field = target.dataset.field;
        if (Number.isNaN(idx) || !state.data.sections[idx] || !field) return;
        state.data.sections[idx][field] = target.innerText;
      });

      el.viewRoot.addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-remove-index]");
        if (btn && state.editMode) {
          const idx = Number(btn.dataset.removeIndex);
          if (Number.isNaN(idx)) return;
          state.data.sections.splice(idx, 1);
          renderView();
          return;
        }

        const addBtn = event.target.closest("button[data-add-image-section]");
        if (addBtn && state.editMode) {
          const sectionIndex = Number(addBtn.dataset.addImageSection);
          if (Number.isNaN(sectionIndex)) return;
          state.pendingImageSection = sectionIndex;
          el.imageUploadInput.value = "";
          el.imageUploadInput.click();
          return;
        }

        const removeImageBtn = event.target.closest("button.image-remove");
        if (removeImageBtn && state.editMode) {
          const sectionIndex = Number(removeImageBtn.dataset.sectionIndex);
          const imageIndex = Number(removeImageBtn.dataset.imageIndex);
          if (Number.isNaN(sectionIndex) || Number.isNaN(imageIndex)) return;
          const image = state.data.sections[sectionIndex]?.images?.[imageIndex];
          if (!image) return;
          state.data.sections[sectionIndex].images.splice(imageIndex, 1);
          renderView();
          tryDeleteImageFromStorage(image);
        }
      });

      el.imageUploadInput.addEventListener("change", async (event) => {
        if (!state.editMode || !state.isAdmin) return;
        const file = event.target.files?.[0];
        const sectionIndex = state.pendingImageSection;
        state.pendingImageSection = null;
        if (!file || sectionIndex == null || !state.data.sections[sectionIndex]) return;

        el.saveState.textContent = "Uploading image";
        try {
          await uploadImageToSection(sectionIndex, file);
          renderView();
          el.saveState.textContent = "Image ready - Save to Firestore";
        } catch (error) {
          console.error("Image upload failed", error);
          alert("Image upload failed. Check Firebase Storage permissions.");
          el.saveState.textContent = "Image upload failed";
        }
      });
    }

    document.addEventListener("authReady", ({ detail: { profile } }) => {
      state.isAdmin = profile?.role === "central_admin";
      if (state.isAdmin) el.adminToolbar.style.display = "flex";
      else el.adminNotice.style.display = "block";

      wireEvents();
      state.unsub = onSnapshot(doc(window.db, ...DOC_PATH), (snapshot) => {
        state.data = snapshot.exists() ? normalizeData(snapshot.data()) : structuredClone(DEFAULT_DATA);
        state.source = snapshot.exists() ? "firestore" : "default";
        state.originalData = structuredClone(state.data);
        if (!state.editMode) renderView();
        el.saveState.textContent = "Synced";
      }, (error) => {
        console.error("Failed to read handbook", error);
        state.data = structuredClone(DEFAULT_DATA);
        state.originalData = structuredClone(state.data);
        state.source = "default";
        renderView();
        el.saveState.textContent = "Read failed";
      });

      renderView();
    });

    window.addEventListener("beforeunload", () => {
      if (typeof state.unsub === "function") state.unsub();
    });
  </script>
</body>
</html>
