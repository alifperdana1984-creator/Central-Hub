<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#1c1c2e; --ink-2:#44445a; --ink-3:#8888a8;
      --paper:#f7f6f3; --paper-2:#efede8; --white:#ffffff;
      --border:#e0ddd6; --accent:#0891b2; --accent-dk:#0e7490;
      --shadow-sm:0 1px 4px rgba(28,28,46,.07);
      --shadow:0 3px 14px rgba(28,28,46,.10);
      --shadow-lg:0 10px 40px rgba(28,28,46,.16);
      --radius:10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* NAV */
    .top-nav { position: sticky; top: 0; z-index: 100; height: 62px; padding: 0 28px; display: flex; align-items: center; gap: 28px; background: rgba(5,5,16,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .nav-brand-name { font-size: 1.05rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link.active { color: #fff; background: rgba(255,255,255,0.10); }
    .nav-auth { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-user-name { font-size: 0.875rem; color: rgba(255,255,255,0.65); }
    .nav-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed,#0891b2); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; color: #fff; flex-shrink: 0; user-select: none; }
    .btn-logout { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.48); background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,0.28); }

    /* PAGE LAYOUT */
    .page-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 62px); }

    /* SIDEBAR */
    .sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto; }
    .sidebar-title { font-size: 0.7rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .sidebar-section { margin-bottom: 24px; }
    .filter-label { font-size: 0.8rem; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; display: block; }
    .filter-select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; color: var(--ink); background: var(--paper); outline: none; }
    .filter-select:focus { border-color: var(--accent); }
    .sidebar-stat { display: flex; justify-content: space-between; align-items: center; font-size: 0.83rem; color: var(--ink-2); padding: 6px 0; border-bottom: 1px solid var(--paper-2); }
    .sidebar-stat:last-child { border-bottom: none; }
    .sidebar-stat-val { font-weight: 600; color: var(--ink); }

    /* MAIN */
    .main-content {
      padding: 28px 32px;
      width: min(100%, 980px);
      margin: 0 auto;
    }
    .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: gap; gap: 12px; }
    .main-header h1 { font-size: 1.4rem; font-weight: 600; }
    .btn-add { display: none; align-items: center; gap: 6px; padding: 9px 16px; background: linear-gradient(135deg,#7c3aed,#0891b2); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ANNOUNCEMENT CARDS */
    .announcements-list { display: flex; flex-direction: column; gap: 16px; }
    .ann-pagination { margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .ann-page-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
    }
    .ann-page-btn:hover:not(:disabled) { border-color: #c4b5fd; color: var(--ink); background: #faf8ff; }
    .ann-page-btn.active { background: linear-gradient(135deg,#7c3aed,#0891b2); color: #fff; border-color: transparent; }
    .ann-page-btn:disabled { opacity: .45; cursor: not-allowed; }
    .ann-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, transform 0.2s; }
    .ann-card:hover { box-shadow: var(--shadow); }
    .ann-card.pinned { border-left: 3px solid #d97706; }
    .ann-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .ann-title-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ann-title { font-size: 1.05rem; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .ann-image-wrap { margin: 4px 0 12px; }
    .ann-image {
      display: block;
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: zoom-in;
      background: var(--paper-2);
    }
    .ann-body { font-size: 0.88rem; color: var(--ink-2); line-height: 1.65; margin-bottom: 14px; }
    .ann-body.truncated { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .ann-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .ann-author { display: flex; align-items: center; gap: 8px; }
    .ann-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed,#0891b2); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .ann-meta { font-size: 0.8rem; color: var(--ink-3); }
    .ann-actions { display: flex; align-items: center; gap: 8px; }
    .btn-readmore { font-size: 0.82rem; font-weight: 500; color: var(--accent); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0; }
    .btn-readmore:hover { color: var(--accent-dk); }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-3); transition: color 0.2s, border-color 0.2s; }
    .btn-icon:hover { color: var(--ink); border-color: #bbb; }
    .btn-icon.pin-active { color: #d97706; border-color: #d97706; background: #fef3c7; }
    .btn-icon-delete { color: var(--ink-3); }
    .btn-icon-delete:hover { color: #dc2626; border-color: #fca5a5; background: #fee2e2; }
    .admin-actions { display: none; align-items: center; gap: 6px; }
    .admin-actions.visible { display: flex; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .badge-amber  { background: #fef3c7; color: #92400e; }
    .badge-teal   { background: #e0f2fe; color: #0e7490; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-orange { background: #ffedd5; color: #9a3412; }

    /* PLATFORM CHECKBOXES (modal) */
    .platform-checks { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 2px; }
    .platform-check-item { display: flex; align-items: center; gap: 7px; font-size: 0.875rem; color: var(--ink-2); cursor: pointer; user-select: none; }
    .platform-check-item input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

    /* PLATFORM CHIPS (card list) */
    .ann-platforms { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 4px; }
    .plat-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid transparent; }
    .plat-chip svg { flex-shrink: 0; }
    .plat-on-central  { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .plat-on-academic { background: #e0f2fe; color: #0e7490; border-color: #7dd3fc; }
    .plat-on-teachers { background: #dcfce7; color: #166534; border-color: #86efac; }
    .plat-off { background: var(--paper-2); color: var(--ink-3); border-color: var(--border); opacity: 0.55; }

    /* CATEGORY CHIPS (filter bar) */
    .category-filter { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .cat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 15px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--ink-2); cursor: pointer; transition: all 0.15s; user-select: none; }
    .cat-chip:hover { border-color: #a5b4fc; color: var(--ink); background: #faf8ff; }
    .cat-chip.active { border-color: transparent; color: #fff; }
    .cat-chip-all.active       { background: var(--ink); }
    .cat-chip-assignments.active { background: #0891b2; }
    .cat-chip-academics.active   { background: #7c3aed; }
    .cat-chip-appraisals.active  { background: #d97706; }
    .badge-assignments { background: #e0f2fe; color: #0e7490; }
    .badge-academics   { background: #ede9fe; color: #5b21b6; }
    .badge-appraisals  { background: #fef3c7; color: #92400e; }

    /* EMPTY / SKELETON */
    .empty-state { padding: 60px; text-align: center; color: var(--ink-3); font-size: 0.9rem; }
    .skel { background: linear-gradient(90deg,var(--paper-2) 25%,var(--paper) 50%,var(--paper-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; display: block; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,28,46,0.55); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 560px; box-shadow: var(--shadow-lg); animation: modalIn 0.25s ease; max-height: 90vh; display: flex; flex-direction: column; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-head h3 { font-size: 1rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.4rem; color: var(--ink-3); cursor: pointer; line-height: 1; padding: 0; transition: color 0.2s; }
    .modal-close:hover { color: var(--ink); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .modal-footer { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 0.82rem; font-weight: 500; color: var(--ink-2); }
    .form-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); background: var(--white); }
    .form-input::placeholder { color: var(--ink-3); }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; color: var(--ink-2); cursor: pointer; }
    .form-check input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
    .btn-cancel { padding: 9px 18px; background: none; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--ink-2); cursor: pointer; }
    .btn-cancel:hover { border-color: #bbb; }
    .btn-save { padding: 9px 20px; background: linear-gradient(135deg,#7c3aed,#0891b2); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-error { font-size: 0.82rem; color: #dc2626; background: #fee2e2; border-radius: 6px; padding: 8px 12px; display: none; }
    .modal-error.visible { display: block; }
    .modal-image-input {
      width: 100%;
      padding: 7px 0;
      font-size: 0.84rem;
      color: var(--ink-2);
    }
    .modal-image-preview {
      display: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: var(--paper);
      margin-top: 6px;
    }
    .modal-image-preview.visible { display: block; }
    .modal-image-preview img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }
    .modal-image-remove {
      margin-top: 8px;
      background: none;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 5px 9px;
      cursor: pointer;
    }
    .modal-image-help { font-size: 0.76rem; color: var(--ink-3); margin-top: 4px; }

    /* MEETING MINUTES CATEGORY */
    .cat-chip-meeting-minutes.active { background: #0f766e; }
    .badge-meeting-minutes { background: #ccfbf1; color: #134e4a; }

    /* LOCKED BADGE */
    .badge-locked { background: #fee2e2; color: #991b1b; }

    /* SEARCH INPUT */
    .search-input-wrap { position: relative; }
    .search-input { width: 100%; padding: 8px 10px 8px 32px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; color: var(--ink); background: var(--paper); outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--ink-3); }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }

    /* RICH TEXT EDITOR */
    .rich-editor-wrap { border: 1px solid var(--border); border-radius: 7px; background: var(--paper); transition: border-color 0.2s; }
    .rich-editor-wrap:focus-within { border-color: var(--accent); background: var(--white); }
    .rich-editor-toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .rte-btn { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; min-width: 28px; height: 26px; padding: 0 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--white); color: var(--ink-2); cursor: pointer; transition: all 0.12s; display: flex; align-items: center; justify-content: center; }
    .rte-btn:hover { background: var(--paper-2); color: var(--ink); border-color: #bbb; }
    .rte-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .rte-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
    .rte-size-select { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; height: 26px; padding: 0 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--white); color: var(--ink-2); cursor: pointer; outline: none; }
    .rte-size-select:focus { border-color: var(--accent); }
    .rich-editor-area { min-height: 140px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); line-height: 1.6; outline: none; overflow-y: auto; }
    .rich-editor-area:empty::before { content: attr(data-placeholder); color: var(--ink-3); pointer-events: none; }
    .rich-editor-area font[size="2"] { font-size: 0.78em; }
    .rich-editor-area font[size="3"] { font-size: 1em; }
    .rich-editor-area font[size="5"] { font-size: 1.35em; }

    /* IMAGE LIGHTBOX */
    .image-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 12, 0.82);
      backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .image-lightbox.open { display: flex; }
    .lightbox-content {
      position: relative;
      max-width: min(96vw, 1080px);
      max-height: 90vh;
    }
    .lightbox-image {
      display: block;
      width: 100%;
      max-width: min(96vw, 1080px);
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
      background: rgba(255, 255, 255, 0.02);
    }
    .lightbox-close {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .top-nav { padding: 0 16px; gap: 14px; }
      .nav-link { padding: 6px 9px; font-size: 0.8rem; }
      .nav-user-name { display: none; }
      .btn-logout { padding: 5px 9px; font-size: 0.76rem; }
    }
    @media (max-width: 640px) {
      .top-nav { height: 58px; padding: 0 10px; gap: 10px; }
      .nav-brand-name { display: none; }
      .nav-avatar { width: 30px; height: 30px; font-size: 0.7rem; }
      .btn-logout {
        width: 34px;
        height: 34px;
        padding: 0;
        overflow: hidden;
        text-indent: -9999px;
        position: relative;
      }
      .btn-logout::before {
        content: '\u2192';
        position: absolute;
        inset: 0;
        text-indent: 0;
        display: grid;
        place-items: center;
        color: rgba(255,255,255,0.75);
        font-size: 14px;
      }
    }
    @media (max-width: 768px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
      .main-content { padding: 20px 16px; width: 100%; }
      .nav-links { display: none; }
    }
  </style>

</head>
<body>

<!-- SHARED_NAVBAR -->

<div class="page-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" aria-label="Filters">
    <div class="sidebar-section">
      <p class="sidebar-title">Search</p>
      <div class="search-input-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search announcements…" autocomplete="off">
      </div>
    </div>
    <div class="sidebar-section">
      <p class="sidebar-title">Filter</p>
      <label class="filter-label" for="showFilter">Show</label>
      <select class="filter-select" id="showFilter">
        <option value="all">All announcements</option>
        <option value="pinned">Pinned only</option>
      </select>
    </div>
    <div class="sidebar-section">
      <label class="filter-label" for="sortFilter">Sort by</label>
      <select class="filter-select" id="sortFilter">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
    <div class="sidebar-section">
      <label class="filter-label" for="monthFilter">Month</label>
      <select class="filter-select" id="monthFilter">
        <option value="all">All months</option>
      </select>
    </div>
    <div class="sidebar-section">
      <p class="sidebar-title">Stats</p>

  <!-- MAIN -->
  <main class="main-content">

    <div class="category-filter" id="catFilter">
      <button class="cat-chip cat-chip-all active" data-cat="all">All</button>
      <button class="cat-chip cat-chip-assignments" data-cat="assignments">

        Assignments
      </button>
      <button class="cat-chip cat-chip-academics" data-cat="academics">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Academics
      </button>
      <button class="cat-chip cat-chip-appraisals" data-cat="appraisals">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Appraisals
      </button>
      <button class="cat-chip cat-chip-meeting-minutes" data-cat="meeting-minutes">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Meeting Minutes

    <div class="announcements-list" id="annList">
      <!-- skeleton -->
      <div class="ann-card"><span class="skel" style="height:20px;width:60%;margin-bottom:10px"></span><span class="skel" style="height:14px;width:100%;margin-bottom:6px"></span><span class="skel" style="height:14px;width:80%"></span></div>
      <div class="ann-card"><span class="skel" style="height:20px;width:45%;margin-bottom:10px"></span><span class="skel" style="height:14px;width:100%;margin-bottom:6px"></span><span class="skel" style="height:14px;width:70%"></span></div>
    </div>
    <div class="ann-pagination" id="annPagination"></div>
  </main>
</div>

        <div class="platform-checks">
          <label class="platform-check-item">
            <input type="checkbox" id="platCentral" checked>
            CentralHub
          </label>
          <label class="platform-check-item">
            <input type="checkbox" id="platAcademic">
            Academic Hub
          </label>
          <label class="platform-check-item">
            <input type="checkbox" id="platTeachers">
            Teachers Hub
          </label>

        Lock this post (only you can edit)

        <select class="form-input" id="fieldLinkedTopic">
          <option value="">None</option>
          <!-- populated by loadTopicDropdownForAnn() -->
        </select>
        <p style="font-size:0.76rem;color:#8888a8;margin-top:3px;">
          Optional — Bu duyuru seçilen topic sayfasında İlişkili Duyuru olarak görünecek.

<div class="image-lightbox" id="imageLightbox" aria-hidden="true">

    <button class="lightbox-close" id="lightboxClose" aria-label="Close image preview">&times;</button>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
  import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc as fsDoc, query, orderBy, where, limit, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

  let db;
  let storage;
  let allAnns = [];
  const PAGE_SIZE = 5;
  let currentPage = 1;
  let isAdmin = false;
  let activeCategory = 'all';
  let activeMonth = 'all';
  let searchText = '';
  let editingId = null;
  let currentUser = null;
  let modalImageFile = null;
  let modalImageObjectUrl = null;
  let modalExistingImageUrl = '';
  let modalExistingImagePath = '';
  let modalRemoveExistingImage = false;

  document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
    db = window.db;
    storage = getStorage(window.firebaseApp);
    currentUser = user;
    isAdmin = profile.role === 'central_admin';
    if (isAdmin) document.getElementById('addAnnBtn').style.display = 'flex';
    await loadAnnouncements();
    bindControls();
    loadTopicDropdownForAnn();
  });

  async function loadTopicDropdownForAnn() {
    const sel = document.getElementById('fieldLinkedTopic');
    if (!sel) return;
    while (sel.options.length > 1) sel.remove(1);
    try {
      const snap = await getDocs(
        query(
          collection(db, 'topics'),
          where('status', 'in', ['open', 'in_progress']),
          orderBy('createdAt', 'desc'),
          limit(50)
        )
      );
      snap.docs.forEach(d => {
        const t = d.data();
        const opt = document.createElement('option');
        opt.value = d.id;
        const dateStr = t.createdAt?.toDate
          ? t.createdAt.toDate().toLocaleDateString('en-GB', {day:'numeric', month:'short'})
          : '';
        opt.textContent = `${t.title || 'Untitled'} (${dateStr})`;
        sel.appendChild(opt);
      });
    } catch(e) {
      console.warn('Could not load topics for announcement form:', e);
    }
  }

  async function loadAnnouncements() {
    try {
      const snap = await getDocs(query(collection(db, 'announcements'), orderBy('createdAt', 'desc')));
      allAnns = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(a => !a.platforms || a.platforms.includes('centralhub'));
      updateStats();
      populateMonthFilter();
      applyFilters();
    } catch (e) {
      document.getElementById('annList').innerHTML = '<div class="empty-state">Could not load announcements.</div>';
      document.getElementById('annPagination').innerHTML = '';
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allAnns.length;
    document.getElementById('statPinned').textContent = allAnns.filter(a => a.pinned).length;
  }

  function bindControls() {
    document.getElementById('showFilter').addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('sortFilter').addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('monthFilter').addEventListener('change', e => { activeMonth = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('searchInput').addEventListener('input', e => { searchText = e.target.value.trim(); currentPage = 1; applyFilters(); });
    document.getElementById('catFilter').addEventListener('click', e => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      activeCategory = chip.dataset.cat;
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c === chip));
      currentPage = 1;
      applyFilters();
    });
    // Rich text editor toolbar
    document.getElementById('rteBold').addEventListener('mousedown', e => { e.preventDefault(); document.execCommand('bold'); updateRteState(); });
    document.getElementById('rteItalic').addEventListener('mousedown', e => { e.preventDefault(); document.execCommand('italic'); updateRteState(); });
    document.getElementById('rteFontSize').addEventListener('change', e => { document.getElementById('fieldBody').focus(); document.execCommand('fontSize', false, e.target.value); });
    document.getElementById('fieldBody').addEventListener('keyup', updateRteState);
    document.getElementById('fieldBody').addEventListener('mouseup', updateRteState);
    document.getElementById('addAnnBtn').addEventListener('click', openAddModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('saveBtn').addEventListener('click', saveAnn);
    document.getElementById('fieldImage').addEventListener('change', onModalImagePicked);
    document.getElementById('removeImageBtn').addEventListener('click', removeModalImage);
    document.getElementById('lightboxClose').addEventListener('click', closeImageLightbox);
    document.getElementById('imageLightbox').addEventListener('click', e => { if (e.target.id === 'imageLightbox') closeImageLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImageLightbox(); });
  }

  function applyFilters() {
    const show = document.getElementById('showFilter').value;
    const sort = document.getElementById('sortFilter').value;
    let list = allAnns.filter(a => {
      if (show === 'pinned' && !a.pinned) return false;
      if (activeCategory !== 'all' && a.category !== activeCategory) return false;
      if (activeMonth !== 'all') {
        const d = a.createdAt?.toDate?.();
        if (!d) return false;
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        if (key !== activeMonth) return false;
      }
      if (searchText) {
        const q = searchText.toLowerCase();
        const inTitle = (a.title || '').toLowerCase().includes(q);
        const inBody = stripHtml(a.body || '').toLowerCase().includes(q);
        if (!inTitle && !inBody) return false;
      }
      return true;
    });
    list = [...list].sort((a, b) => {
      const ta = a.createdAt?.toMillis?.() || 0;
      const tb = b.createdAt?.toMillis?.() || 0;
      return sort === 'oldest' ? ta - tb : tb - ta;
    });
    list.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
    const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const start = (currentPage - 1) * PAGE_SIZE;
    const paged = list.slice(start, start + PAGE_SIZE);
    renderAnns(paged);
    renderPagination(totalPages, list.length);
  }

  function renderPagination(totalPages, totalItems) {
    const el = document.getElementById('annPagination');
    if (totalItems <= PAGE_SIZE || totalPages <= 1) {
      el.innerHTML = '';
      return;
    }

    const nums = Array.from({ length: totalPages }, (_, i) => i + 1).map(p => `
      <button class="ann-page-btn ${p === currentPage ? 'active' : ''}" onclick="setPage(${p})" aria-label="Page ${p}" ${p === currentPage ? 'aria-current="page"' : ''}>${p}</button>
    `).join('');

    el.innerHTML = `
      <button class="ann-page-btn" onclick="setPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
      ${nums}
      <button class="ann-page-btn" onclick="setPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
    `;
  }

  function setPage(page) {
    currentPage = page;
    applyFilters();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderAnns(list) {
    const el = document.getElementById('annList');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">No announcements found.</div>';
      return;
    }

    el.innerHTML = list.map(a => {
      const date = a.createdAt?.toDate
        ? a.createdAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      const author = a.author || 'Admin';
      const initials = author.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const pinClass = a.pinned ? ' pinned' : '';
      const pinBadge = a.pinned ? '<span class="badge badge-amber">Pinned</span>' : '';
      const catLabels = { assignments: 'Assignments', academics: 'Academics', appraisals: 'Appraisals', 'meeting-minutes': 'Meeting Minutes' };
      const catBadge = a.category && catLabels[a.category]
        ? `<span class="badge badge-${a.category}">${catLabels[a.category]}</span>` : '';
      const lockedBadge = a.locked ? `<span class="badge badge-locked" title="Locked — only the author can edit">&#128274;</span>` : '';
      const plats = a.platforms || ['centralhub'];
      const checkOn = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const checkOff = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      const platBadges = [
        plats.includes('centralhub')
          ? `<span class="plat-chip plat-on-central">${checkOn} CentralHub</span>`
          : `<span class="plat-chip plat-off">${checkOff} CentralHub</span>`,
        plats.includes('academichub')
          ? `<span class="plat-chip plat-on-academic">${checkOn} Academic Hub</span>`
          : `<span class="plat-chip plat-off">${checkOff} Academic Hub</span>`,
        plats.includes('teachershub')
          ? `<span class="plat-chip plat-on-teachers">${checkOn} Teachers Hub</span>`
          : `<span class="plat-chip plat-off">${checkOff} Teachers Hub</span>`,
      ].join('');
      const canEdit = isAdmin && (!a.locked || !a.authorId || a.authorId === currentUser?.uid);
      const adminActions = isAdmin ? `
        <div class="admin-actions visible">
          <button class="btn-icon ${a.pinned ? 'pin-active' : ''}" onclick="togglePin('${a.id}',${!!a.pinned})" aria-label="${a.pinned ? 'Unpin' : 'Pin'} announcement" title="${a.pinned ? 'Unpin' : 'Pin'}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${a.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
          ${canEdit ? `<button class="btn-icon" onclick="editAnn('${a.id}')" aria-label="Edit" title="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-icon-delete" onclick="deleteAnn('${a.id}')" aria-label="Delete" title="Delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>` : ''}
        </div>` : '';
      const imageHtml = a.imageUrl ? `
          <div class="ann-image-wrap">
            <img class="ann-image" src="${esc(a.imageUrl)}" alt="Announcement image" loading="lazy">
          </div>` : '';

      return `
        <article class="ann-card${pinClass}" id="ann-${a.id}">
          <div class="ann-top">
            <div class="ann-title-wrap">
              <h2 class="ann-title">${esc(a.title || 'Untitled')}</h2>
              ${pinBadge}
              ${catBadge}
              ${lockedBadge}
            </div>
            ${adminActions}
          </div>
          ${imageHtml}
          <div class="ann-body truncated" id="body-${a.id}"></div>
          <div class="ann-platforms">${platBadges}</div>
          <div class="ann-footer">
            <div class="ann-author">
              <div class="ann-avatar" aria-hidden="true">${initials}</div>
              <span class="ann-meta">${esc(author)} &middot; ${date}</span>
            </div>
            <button class="btn-readmore" onclick="toggleRead('${a.id}')" data-expanded="false">Read more</button>
          </div>
        </article>`;
    }).join('');

    // Safely set body content using renderBody
    list.forEach(a => {
      const bodyEl = document.getElementById('body-' + a.id);
      if (bodyEl) bodyEl.innerHTML = renderBody(a.body || '');
    });

    el.querySelectorAll('.ann-image').forEach(img => {
      img.addEventListener('click', () => openImageLightbox(img.src, img.alt));
    });
  }

  function toggleRead(id) {
    const body = document.getElementById('body-' + id);
    const btn = body.closest('.ann-card').querySelector('.btn-readmore');
    const expanded = btn.dataset.expanded === 'true';
    body.classList.toggle('truncated', expanded);
    btn.textContent = expanded ? 'Read more' : 'Show less';
    btn.dataset.expanded = String(!expanded);
  }

  async function togglePin(id, currentlyPinned) {
    try {
      await updateDoc(fsDoc(db, 'announcements', id), { pinned: !currentlyPinned });
      await loadAnnouncements();
    } catch (e) {
      alert(e.message);
    }
  }

  async function deleteAnn(id) {
    if (!confirm('Delete this announcement? This cannot be undone.')) return;
    try {
      const a = allAnns.find(x => x.id === id);
      if (a?.imagePath) await deleteStorageFile(a.imagePath);
      await deleteDoc(fsDoc(db, 'announcements', id));
      allAnns = allAnns.filter(a => a.id !== id);
      updateStats();
      applyFilters();
    } catch (e) {
      alert(e.message);
    }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'New Announcement';
    document.getElementById('fieldTitle').value = '';
    document.getElementById('fieldBody').innerHTML = '';
    document.getElementById('fieldCategory').value = '';
    document.getElementById('fieldPinned').checked = false;
    document.getElementById('fieldLocked').checked = false;
    document.getElementById('platCentral').checked = true;
    document.getElementById('platAcademic').checked = false;
    document.getElementById('platTeachers').checked = false;
    document.getElementById('fieldImage').value = '';
    modalImageFile = null;
    cleanupModalImageObjectUrl();
    modalExistingImageUrl = '';
    modalExistingImagePath = '';
    modalRemoveExistingImage = false;
    renderModalImagePreview();
    document.getElementById('fieldLinkedTopic').value = '';
    document.getElementById('saveBtn').textContent = 'Publish';
    hideErr();
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fieldTitle').focus();
  }

  function editAnn(id) {
    const a = allAnns.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Announcement';
    document.getElementById('fieldTitle').value = a.title || '';
    document.getElementById('fieldBody').innerHTML = renderBody(a.body || '');
    document.getElementById('fieldCategory').value = a.category || '';
    document.getElementById('fieldPinned').checked = !!a.pinned;
    document.getElementById('fieldLocked').checked = !!a.locked;
    const plats = a.platforms || ['centralhub'];
    document.getElementById('platCentral').checked = plats.includes('centralhub');
    document.getElementById('platAcademic').checked = plats.includes('academichub');
    document.getElementById('platTeachers').checked = plats.includes('teachershub');
    document.getElementById('fieldImage').value = '';
    modalImageFile = null;
    cleanupModalImageObjectUrl();
    modalExistingImageUrl = a.imageUrl || '';
    modalExistingImagePath = a.imagePath || '';
    modalRemoveExistingImage = false;
    renderModalImagePreview();
    document.getElementById('fieldLinkedTopic').value = '';
    document.getElementById('saveBtn').textContent = 'Update';
    hideErr();
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fieldTitle').focus();
  }

  function closeModal() {
    cleanupModalImageObjectUrl();
    document.getElementById('fieldLinkedTopic').value = '';
    document.getElementById('modalOverlay').classList.remove('open');
  }
  function showErr(msg) {
    const e = document.getElementById('modalError');
    e.textContent = msg;
    e.classList.add('visible');
  }
  function hideErr() {
    document.getElementById('modalError').classList.remove('visible');
  }

  async function saveAnn() {
    const title = document.getElementById('fieldTitle').value.trim();
    const bodyEl = document.getElementById('fieldBody');
    const body = bodyEl.innerHTML.trim();
    const category = document.getElementById('fieldCategory').value;
    const pinned = document.getElementById('fieldPinned').checked;
    const locked = document.getElementById('fieldLocked').checked;
    if (!title || !bodyEl.textContent.trim()) {
      showErr('Title and content are required.');
      return;
    }

    const platforms = [];
    if (document.getElementById('platCentral').checked) platforms.push('centralhub');
    if (document.getElementById('platAcademic').checked) platforms.push('academichub');
    if (document.getElementById('platTeachers').checked) platforms.push('teachershub');
    if (!platforms.length) {
      showErr('At least one platform must be selected.');
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      let imageUrl = modalExistingImageUrl;
      let imagePath = modalExistingImagePath;

      if (modalImageFile) {
        const uploaded = await uploadAnnouncementImage(modalImageFile, currentUser.uid);
        imageUrl = uploaded.url;
        imagePath = uploaded.path;
        if (modalExistingImagePath && modalExistingImagePath !== imagePath) {
          await deleteStorageFile(modalExistingImagePath);
        }
      } else if (modalRemoveExistingImage) {
        await deleteStorageFile(modalExistingImagePath);
        imageUrl = '';
        imagePath = '';
      }

      if (editingId) {
        await updateDoc(fsDoc(db, 'announcements', editingId), { title, body, category, pinned, locked, platforms, imageUrl, imagePath });
      } else {
        const annRef = await addDoc(collection(db, 'announcements'), {
          title, body, category, pinned, locked, platforms, imageUrl, imagePath,
          author: currentUser.displayName || currentUser.email,
          authorId: currentUser.uid,
          createdAt: serverTimestamp(),
        });
        const annId = annRef.id;
        const linkedTopicId = document.getElementById('fieldLinkedTopic').value;
        if (linkedTopicId) {
          try {
            // Primary: set linkedAnnouncementId on the topic (this is what the thread view reads)
            await updateDoc(fsDoc(db, 'topics', linkedTopicId), {
              linkedAnnouncementId: annId
            });
            // Secondary: set linkedTopicId on the announcement (informational only)
            await updateDoc(fsDoc(db, 'announcements', annId), {
              linkedTopicId: linkedTopicId
            });
          } catch(e) {
            console.warn('Bidirectional link failed:', e);
            showErr('Announcement saved, but linking to topic failed. Check console for details.');
          }
        }
      }
      closeModal();
      await loadAnnouncements();
    } catch (e) {
      showErr(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? 'Update' : 'Publish';
    }
  }

  function cleanupModalImageObjectUrl() {
    if (!modalImageObjectUrl) return;
    URL.revokeObjectURL(modalImageObjectUrl);
    modalImageObjectUrl = null;
  }

  function renderModalImagePreview() {
    const wrap = document.getElementById('imagePreviewWrap');
    const img = document.getElementById('imagePreview');
    let src = '';

    if (modalImageFile) {
      cleanupModalImageObjectUrl();
      modalImageObjectUrl = URL.createObjectURL(modalImageFile);
      src = modalImageObjectUrl;
    } else if (!modalRemoveExistingImage && modalExistingImageUrl) {
      src = modalExistingImageUrl;
    }

    if (!src) {
      img.src = '';
      wrap.classList.remove('visible');
      return;
    }
    img.src = src;
    wrap.classList.add('visible');
  }

  function onModalImagePicked(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) {
      modalImageFile = null;
      renderModalImagePreview();
      return;
    }
    if (!file.type.startsWith('image/')) {
      showErr('Please select a valid image file.');
      e.target.value = '';
      modalImageFile = null;
      renderModalImagePreview();
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showErr('Image is too large. Maximum size is 5 MB.');
      e.target.value = '';
      modalImageFile = null;
      renderModalImagePreview();
      return;
    }
    hideErr();
    modalImageFile = file;
    modalRemoveExistingImage = false;
    renderModalImagePreview();
  }

  function removeModalImage() {
    modalImageFile = null;
    document.getElementById('fieldImage').value = '';
    modalRemoveExistingImage = true;
    cleanupModalImageObjectUrl();
    renderModalImagePreview();
  }

  async function deleteStorageFile(path) {
    if (!path) return;
    try {
      await deleteObject(storageRef(storage, path));
    } catch (e) {
      console.warn('Could not delete image:', e);
    }
  }

  async function uploadAnnouncementImage(file, authorId) {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '');
    const path = `announcements/${authorId}/${Date.now()}-${Math.random().toString(36).slice(2, 10)}.${ext || 'jpg'}`;
    const fileRef = storageRef(storage, path);
    await uploadBytes(fileRef, file, { contentType: file.type || 'image/jpeg' });
    const url = await getDownloadURL(fileRef);
    return { url, path };
  }

  function openImageLightbox(src, alt = 'Announcement image') {
    const overlay = document.getElementById('imageLightbox');
    const img = document.getElementById('lightboxImage');
    img.src = src;
    img.alt = alt;
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeImageLightbox() {
    const overlay = document.getElementById('imageLightbox');
    const img = document.getElementById('lightboxImage');
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    img.src = '';
    document.body.style.overflow = '';
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function sanitizeHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('script,style,iframe,object,embed,form,input,textarea,button,link,meta').forEach(el => el.remove());
    tmp.querySelectorAll('*').forEach(el => {
      [...el.attributes].forEach(attr => {
        if (attr.name.startsWith('on') || attr.name === 'action') el.removeAttribute(attr.name);
        if ((attr.name === 'href' || attr.name === 'src') && /^javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
      });
    });
    return tmp.innerHTML;
  }

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || '';
  }

  function renderBody(body) {
    if (!body) return '';
    if (/<[a-z][\s\S]*>/i.test(body)) return sanitizeHtml(body);
    return esc(body).replace(/\n/g, '<br>');
  }

  function populateMonthFilter() {
    const sel = document.getElementById('monthFilter');
    const currentVal = sel.value;
    const months = {};
    allAnns.forEach(a => {
      const d = a.createdAt?.toDate?.();
      if (!d) return;
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      if (!months[key]) {
        months[key] = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      }
    });
    const keys = Object.keys(months).sort().reverse();
    sel.innerHTML = '<option value="all">All months</option>' +
      keys.map(k => `<option value="${k}"${k === currentVal ? ' selected' : ''}>${months[k]}</option>`).join('');
    if (!keys.includes(activeMonth)) activeMonth = 'all';
  }

  function updateRteState() {
    document.getElementById('rteBold').classList.toggle('active', document.queryCommandState('bold'));
    document.getElementById('rteItalic').classList.toggle('active', document.queryCommandState('italic'));
  }

  window.togglePin = togglePin;
  window.editAnn = editAnn;
  window.deleteAnn = deleteAnn;
  window.toggleRead = toggleRead;
  window.setPage = setPage;
</script>
</body>
</html>
