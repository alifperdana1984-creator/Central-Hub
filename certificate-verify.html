<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #1c1c2e;
      --ink-2:     #44445a;
      --ink-3:     #8888a8;
      --paper:     #f7f6f3;
      --paper-2:   #efede8;
      --white:     #ffffff;
      --border:    #e0ddd6;
      --accent:    #0891b2;
      --accent-dk: #0e7490;
      --shadow-sm: 0 1px 4px rgba(28,28,46,.07);
      --shadow:    0 3px 14px rgba(28,28,46,.10);
      --shadow-lg: 0 10px 40px rgba(28,28,46,.16);
      --radius:    10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* ===== TOP NAV ===== */
    .top-nav { position: sticky; top: 0; z-index: 100; height: 62px; padding: 0 28px; display: flex; align-items: center; gap: 28px; background: rgba(5,5,16,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .nav-brand-name { font-size: 1.05rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link.active { color: #fff; background: rgba(255,255,255,0.10); }
    .nav-auth { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-user-name { font-size: 0.875rem; color: rgba(255,255,255,0.65); }
    .nav-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed,#0891b2); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; color: #fff; flex-shrink: 0; user-select: none; }
    .btn-logout { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.48); background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,0.28); }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1438 55%, #0c1a2e 100%);
      padding: 40px 40px 56px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 8% 75%, rgba(139,92,246,0.18) 0%, transparent 50%),
        radial-gradient(circle at 88% 15%, rgba(8,145,178,0.14) 0%, transparent 48%);
      animation: heroPulse 10s ease-in-out infinite alternate;
    }
    @keyframes heroPulse {
      0%   { opacity: 0.65; transform: scale(1);    }
      100% { opacity: 1;    transform: scale(1.04); }
    }
    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0891b2;
    }
    .hero-title {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .hero-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.42);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ===== SEARCH CARD (floats over hero) ===== */
    .search-card {
      position: relative;
      z-index: 10;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: var(--shadow-lg);
      max-width: 680px;
      margin: 0 auto -32px;
    }
    .search-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 10px;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-3);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      letter-spacing: 0.03em;
    }
    .search-input:focus { border-color: var(--accent); background: var(--white); }
    .search-input::placeholder { font-family: 'DM Sans', sans-serif; letter-spacing: 0; color: var(--ink-3); }
    .btn-verify {
      padding: 11px 22px;
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-verify:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-verify:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ===== PAGE WRAP ===== */
    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 28px 80px;
    }

    /* ===== RESULT STATES ===== */
    .result-idle {
      text-align: center;
      padding: 36px 24px;
      color: var(--ink-3);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .result-idle svg { opacity: 0.35; margin-bottom: 12px; }

    /* Loading skeleton */
    .skel {
      background: linear-gradient(90deg, var(--paper-2) 25%, var(--paper) 50%, var(--paper-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      display: block;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .result-loading {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Not found */
    .result-notfound {
      background: var(--white);
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .nf-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fee2e2;
      color: #dc2626;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .nf-title { font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .nf-sub { font-size: 0.875rem; color: var(--ink-3); line-height: 1.6; }

    /* Found / Verified */
    .result-found {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cert-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--paper-2);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .cert-status-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cert-status-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .csi-sent    { background: #d1fae5; color: #059669; }
    .csi-issued  { background: #fef3c7; color: #d97706; }
    .csi-revoked { background: #fee2e2; color: #dc2626; }

    .cert-status-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 3px;
    }
    .csl-sent    { color: #059669; }
    .csl-issued  { color: #d97706; }
    .csl-revoked { color: #dc2626; }

    .cert-status-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
    }

    .cert-number {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--ink-3);
      background: var(--paper-2);
      border-radius: 6px;
      padding: 5px 10px;
      letter-spacing: 0.04em;
      align-self: center;
      white-space: nowrap;
    }

    .cert-body { padding: 20px 24px; }

    .cert-name {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .cert-institution {
      font-size: 0.9rem;
      color: var(--ink-3);
      margin-bottom: 20px;
    }

    .cert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 24px;
    }
    .cert-field {}
    .cert-field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 3px;
    }
    .cert-field-value {
      font-size: 0.9rem;
      color: var(--ink);
      font-weight: 500;
    }

    .cert-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--paper-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--paper);
    }
    .cert-footer-note {
      font-size: 0.78rem;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-pdf {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-2);
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero { padding: 32px 20px 52px; }
      .hero-title { font-size: 1.6rem; }
      .page-wrap { padding: 52px 16px 60px; }
      .search-card { margin: 0 16px -28px; }
      .cert-grid { grid-template-columns: 1fr; }
      .cert-name { font-size: 1.35rem; }
      .search-row { flex-direction: column; }
    }
    @media (max-width: 640px) {
      .top-nav { height: 58px; padding: 0 10px; gap: 10px; }
      .nav-brand-name { display: none; }
      .nav-user-name { display: none; }
      .btn-logout { width: 34px; height: 34px; padding: 0; overflow: hidden; text-indent: -9999px; position: relative; }
      .btn-logout::before { content: '\2192'; position: absolute; inset: 0; text-indent: 0; display: grid; place-items: center; color: rgba(255,255,255,0.75); font-size: 14px; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- SHARED_NAVBAR -->

<!-- HERO + SEARCH CARD -->
<div class="hero">
  <div class="hero-inner">
    <p class="hero-badge">
      <span class="hero-badge-dot"></span>
      Eduversal · Certificate Registry
    </p>
    <h1 class="hero-title">Certificate Verification</h1>
    <p class="hero-sub">Enter the certificate number from your document or use the QR code link to instantly verify authenticity.</p>
  </div>
  <div class="search-card">
    <p class="search-label">Certificate number</p>
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          class="search-input"
          id="no"
          type="text"
          placeholder="e.g. DTP-P-072025499"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </div>
      <button class="btn-verify" id="findBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Verify
      </button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div id="result">
    <!-- idle state shown by default -->
    <div class="result-idle">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px">
        <path d="M4 4h16v12H4z"/><path d="M8 20l4-3 4 3"/><path d="M8 8h8"/><path d="M8 11h5"/>
      </svg>
      Enter a certificate number above and click <strong>Verify</strong> to check its authenticity.
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
import { collection, getDocs, query, where, limit }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const E   = id => document.getElementById(id);
const esc = s  => String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
let db;

// ── State renderers ──────────────────────────────────────────────
function showLoading() {
  E('result').innerHTML = `
    <div class="result-loading">
      <div style="display:flex;align-items:center;gap:14px">
        <span class="skel" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></span>
        <div style="flex:1">
          <span class="skel" style="width:80px;height:11px;margin-bottom:8px"></span>
          <span class="skel" style="width:180px;height:16px"></span>
        </div>
      </div>
      <span class="skel" style="width:100%;height:1px"></span>
      <span class="skel" style="width:280px;height:28px;border-radius:6px"></span>
      <span class="skel" style="width:200px;height:14px"></span>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <span class="skel" style="height:40px;border-radius:6px"></span>
        <span class="skel" style="height:40px;border-radius:6px"></span>
        <span class="skel" style="height:40px;border-radius:6px"></span>
        <span class="skel" style="height:40px;border-radius:6px"></span>
      </div>
    </div>`;
}

function showNotFound(certNo) {
  E('result').innerHTML = `
    <div class="result-notfound">
      <div class="nf-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <p class="nf-title">Certificate not found</p>
      <p class="nf-sub">
        No record matched <strong>${esc(certNo)}</strong>.<br>
        Please check the number and try again, or contact the issuing organisation.
      </p>
    </div>`;
}

function showError() {
  E('result').innerHTML = `
    <div class="result-notfound">
      <div class="nf-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="nf-title">Verification failed</p>
      <p class="nf-sub">Could not connect to the certificate registry. Please try again.</p>
    </div>`;
}

function showFound(d) {
  const status     = (d.status || 'sent').toLowerCase();
  const iconClass  = status === 'sent' ? 'csi-sent' : status === 'revoked' ? 'csi-revoked' : 'csi-issued';
  const labelClass = status === 'sent' ? 'csl-sent' : status === 'revoked' ? 'csl-revoked' : 'csl-issued';

  const statusLabels = { sent: 'Verified & Sent', issued: 'Issued', revoked: 'Revoked' };
  const statusLabel  = statusLabels[status] || status;

  const statusIcons = {
    sent: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    issued: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    revoked: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  };
  const statusIcon = statusIcons[status] || statusIcons.issued;

  const pdfBtn = d.fileUrl
    ? `<a class="btn-pdf" href="${esc(d.fileUrl)}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        View PDF
      </a>`
    : '';

  E('result').innerHTML = `
    <div class="result-found">
      <div class="cert-header">
        <div class="cert-status-block">
          <div class="cert-status-icon ${iconClass}" aria-hidden="true">${statusIcon}</div>
          <div>
            <p class="cert-status-label ${labelClass}">${esc(statusLabel)}</p>
            <p class="cert-status-text">Certificate record found</p>
          </div>
        </div>
        <span class="cert-number">${esc(d.certificateNumber || '')}</span>
      </div>

      <div class="cert-body">
        <p class="cert-name">${esc(d.holderName || '—')}</p>
        <p class="cert-institution">${esc(d.institution || '')}</p>

        <div class="cert-grid">
          <div class="cert-field">
            <p class="cert-field-label">Event</p>
            <p class="cert-field-value">${esc(d.eventName || '—')}</p>
          </div>
          <div class="cert-field">
            <p class="cert-field-label">Event Date</p>
            <p class="cert-field-value">${esc(d.eventDate || '—')}</p>
          </div>
          <div class="cert-field">
            <p class="cert-field-label">Level</p>
            <p class="cert-field-value">${esc(d.level || '—')}</p>
          </div>
          <div class="cert-field">
            <p class="cert-field-label">Issue Date</p>
            <p class="cert-field-value">${esc(d.issueDate || '—')}</p>
          </div>
          ${d.email ? `
          <div class="cert-field">
            <p class="cert-field-label">Email</p>
            <p class="cert-field-value">${esc(d.email)}</p>
          </div>` : ''}
        </div>
      </div>

      <div class="cert-footer">
        <p class="cert-footer-note">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Issued by Eduversal · centralhub-8727b
        </p>
        ${pdfBtn}
      </div>
    </div>`;
}

// ── Verify ───────────────────────────────────────────────────────
async function verify() {
  const certNo = E('no').value.trim();
  if (!certNo) {
    E('no').focus();
    return;
  }

  const btn = E('findBtn');
  btn.disabled = true;
  showLoading();

  try {
    const snap = await getDocs(
      query(collection(db, 'central_certificates'), where('certificateNumber', '==', certNo), limit(1))
    );
    if (snap.empty) {
      showNotFound(certNo);
    } else {
      showFound(snap.docs[0].data());
    }
  } catch (err) {
    console.error(err);
    showError();
  } finally {
    btn.disabled = false;
  }
}

// ── Auth ─────────────────────────────────────────────────────────
document.addEventListener('authReady', async () => {
  db = window.db;
  const no = new URLSearchParams(window.location.search).get('no');
  if (no) {
    E('no').value = no;
    await verify();
  }
});

// ── Events ───────────────────────────────────────────────────────
E('findBtn').onclick = verify;
E('no').addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
</script>
</body>
</html>
