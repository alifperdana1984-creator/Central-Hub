﻿<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Console - CentralHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1c1c2e;
        --ink-2: #44445a;
        --ink-3: #8888a8;
        --paper: #f7f6f3;
        --paper-2: #efede8;
        --white: #ffffff;
        --border: #e0ddd6;
        --accent: #0891b2;
        --accent-dk: #0e7490;
        --shadow-sm: 0 1px 4px rgba(28, 28, 46, 0.07);
        --shadow: 0 3px 14px rgba(28, 28, 46, 0.1);
        --shadow-lg: 0 10px 40px rgba(28, 28, 46, 0.16);
        --radius: 10px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
      }

      /* NAV */
      .top-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        height: 62px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        gap: 28px;
        background: rgba(5, 5, 16, 0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        flex-shrink: 0;
      }
      .nav-brand-name {
        font-size: 1.05rem;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.02em;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 1;
      }
      .nav-link {
        font-size: 0.875rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 6px;
        transition:
          color 0.2s,
          background 0.2s;
      }
      .nav-link:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.07);
      }
      .nav-link.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      .nav-auth {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .nav-user-name {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.65);
      }
      .nav-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7c3aed, #0891b2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.78rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        user-select: none;
      }
      .btn-logout {
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.48);
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 5px 12px;
        cursor: pointer;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .btn-logout:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.28);
      }

      /* PAGE LAYOUT */
      .page-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: calc(100vh - 62px);
      }

      /* SIDEBAR */
      .sidebar {
        background: var(--white);
        border-right: 1px solid var(--border);
        padding: 24px 16px;
        position: sticky;
        top: 62px;
        height: calc(100vh - 62px);
        overflow-y: auto;
      }
      .sidebar-title {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--ink-3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 10px;
      }
      .sidebar-section {
        margin-bottom: 24px;
      }
      .filter-label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--ink-2);
        margin-bottom: 6px;
        display: block;
      }
      .filter-select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 7px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.84rem;
        color: var(--ink);
        background: var(--paper);
        outline: none;
      }
      .filter-select:focus {
        border-color: var(--accent);
      }
      .sidebar-stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.83rem;
        color: var(--ink-2);
        padding: 6px 0;
        border-bottom: 1px solid var(--paper-2);
      }
      .sidebar-stat:last-child {
        border-bottom: none;
      }
      .sidebar-stat-val {
        font-weight: 600;
        color: var(--ink);
      }

      /* MAIN */
      .main-content {
        padding: 28px 32px;
        width: min(100%, 980px);
        margin: 0 auto;
      }
      .main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        flex-wrap: gap;
        gap: 12px;
      }
      .main-header h1 {
        font-size: 1.4rem;
        font-weight: 600;
      }
      .btn-add {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 9px 16px;
        background: linear-gradient(135deg, #7c3aed, #0891b2);
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-add:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      /* ANNOUNCEMENT CARDS */
      .announcements-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .ann-pagination {
        margin-top: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .ann-page-btn {
        min-width: 34px;
        height: 34px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--ink-2);
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .ann-page-btn:hover:not(:disabled) {
        border-color: #c4b5fd;
        color: var(--ink);
        background: #faf8ff;
      }
      .ann-page-btn.active {
        background: linear-gradient(135deg, #7c3aed, #0891b2);
        color: #fff;
        border-color: transparent;
      }
      .ann-page-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .ann-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
        box-shadow: var(--shadow-sm);
        transition:
          box-shadow 0.2s,
          transform 0.2s;
      }
      .ann-card:hover {
        box-shadow: var(--shadow);
      }
      .ann-card.pinned {
        border-left: 3px solid #d97706;
      }
      .ann-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .ann-title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .ann-title {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.3;
      }
      .ann-image-wrap {
        margin: 4px 0 12px;
      }
      .ann-image {
        display: block;
        width: 100%;
        max-height: 300px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--border);
        cursor: zoom-in;
        background: var(--paper-2);
      }
      .ann-body {
        font-size: 0.88rem;
        color: var(--ink-2);
        line-height: 1.65;
        margin-bottom: 14px;
      }
      .ann-body.truncated {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .ann-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }
      .ann-author {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ann-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7c3aed, #0891b2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.68rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .ann-meta {
        font-size: 0.8rem;
        color: var(--ink-3);
      }
      .ann-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-readmore {
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        padding: 0;
      }
      .btn-readmore:hover {
        color: var(--accent-dk);
      }
      .btn-icon {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--ink-3);
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .btn-icon:hover {
        color: var(--ink);
        border-color: #bbb;
      }
      .btn-icon.pin-active {
        color: #d97706;
        border-color: #d97706;
        background: #fef3c7;
      }
      .btn-icon-delete {
        color: var(--ink-3);
      }
      .btn-icon-delete:hover {
        color: #dc2626;
        border-color: #fca5a5;
        background: #fee2e2;
      }
      .admin-actions {
        display: none;
        align-items: center;
        gap: 6px;
      }
      .admin-actions.visible {
        display: flex;
      }

      /* BADGES */
      .badge {
        display: inline-flex;
        align-items: center;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
      }
      .badge-amber {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-teal {
        background: #e0f2fe;
        color: #0e7490;
      }
      .badge-purple {
        background: #ede9fe;
        color: #5b21b6;
      }
      .badge-green {
        background: #dcfce7;
        color: #166534;
      }
      .badge-orange {
        background: #ffedd5;
        color: #9a3412;
      }

      /* PLATFORM CHECKBOXES (modal) */
      .platform-checks {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 2px;
      }
      .platform-check-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.875rem;
        color: var(--ink-2);
        cursor: pointer;
        user-select: none;
      }
      .platform-check-item input {
        width: 15px;
        height: 15px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      /* PLATFORM CHIPS (card list) */
      .ann-platforms {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin: 10px 0 4px;
      }
      .plat-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid transparent;
      }
      .plat-chip svg {
        flex-shrink: 0;
      }
      .plat-on-central {
        background: #ede9fe;
        color: #5b21b6;
        border-color: #c4b5fd;
      }
      .plat-on-academic {
        background: #e0f2fe;
        color: #0e7490;
        border-color: #7dd3fc;
      }
      .plat-on-teachers {
        background: #dcfce7;
        color: #166534;
        border-color: #86efac;
      }
      .plat-off {
        background: var(--paper-2);
        color: var(--ink-3);
        border-color: var(--border);
        opacity: 0.55;
      }

      /* CATEGORY CHIPS (filter bar) */
      .category-filter {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .cat-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 15px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: var(--white);
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--ink-2);
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .cat-chip:hover {
        border-color: #a5b4fc;
        color: var(--ink);
        background: #faf8ff;
      }
      .cat-chip.active {
        border-color: transparent;
        color: #fff;
      }
      .cat-chip-all.active {
        background: var(--ink);
      }
      .cat-chip-assignments.active {
        background: #0891b2;
      }
      .cat-chip-academics.active {
        background: #7c3aed;
      }
      .cat-chip-appraisals.active {
        background: #d97706;
      }
      .badge-assignments {
        background: #e0f2fe;
        color: #0e7490;
      }
      .badge-academics {
        background: #ede9fe;
        color: #5b21b6;
      }
      .badge-appraisals {
        background: #fef3c7;
        color: #92400e;
      }

      /* EMPTY / SKELETON */
      .empty-state {
        padding: 60px;
        text-align: center;
        color: var(--ink-3);
        font-size: 0.9rem;
      }
      .skel {
        background: linear-gradient(
          90deg,
          var(--paper-2) 25%,
          var(--paper) 50%,
          var(--paper-2) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 4px;
        display: block;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(28, 28, 46, 0.55);
        backdrop-filter: blur(4px);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--white);
        border-radius: 14px;
        width: 100%;
        max-width: 560px;
        box-shadow: var(--shadow-lg);
        animation: modalIn 0.25s ease;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .modal-head h3 {
        font-size: 1rem;
        font-weight: 600;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 1.4rem;
        color: var(--ink-3);
        cursor: pointer;
        line-height: 1;
        padding: 0;
        transition: color 0.2s;
      }
      .modal-close:hover {
        color: var(--ink);
      }
      .modal-body {
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
      }
      .modal-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-label {
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--ink-2);
      }
      .form-input {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 7px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        color: var(--ink);
        background: var(--paper);
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        border-color: var(--accent);
        background: var(--white);
      }
      .form-input::placeholder {
        color: var(--ink-3);
      }
      .form-textarea {
        resize: vertical;
        min-height: 140px;
        line-height: 1.6;
      }
      .form-check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.875rem;
        color: var(--ink-2);
        cursor: pointer;
      }
      .form-check input {
        width: 15px;
        height: 15px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .btn-cancel {
        padding: 9px 18px;
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        color: var(--ink-2);
        cursor: pointer;
      }
      .btn-cancel:hover {
        border-color: #bbb;
      }
      .btn-save {
        padding: 9px 20px;
        background: linear-gradient(135deg, #7c3aed, #0891b2);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-save:hover {
        opacity: 0.88;
      }
      .btn-save:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .modal-error {
        font-size: 0.82rem;
        color: #dc2626;
        background: #fee2e2;
        border-radius: 6px;
        padding: 8px 12px;
        display: none;
      }
      .modal-error.visible {
        display: block;
      }
      .modal-image-input {
        width: 100%;
        padding: 7px 0;
        font-size: 0.84rem;
        color: var(--ink-2);
      }
      .modal-image-preview {
        display: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: var(--paper);
        margin-top: 6px;
      }
      .modal-image-preview.visible {
        display: block;
      }
      .modal-image-preview img {
        width: 100%;
        max-height: 220px;
        object-fit: cover;
        border-radius: 6px;
        display: block;
      }
      .modal-image-remove {
        margin-top: 8px;
        background: none;
        border: 1px solid #fca5a5;
        color: #dc2626;
        border-radius: 6px;
        font-size: 0.78rem;
        padding: 5px 9px;
        cursor: pointer;
      }
      .modal-image-help {
        font-size: 0.76rem;
        color: var(--ink-3);
        margin-top: 4px;
      }

      /* MEETING MINUTES CATEGORY */
      .cat-chip-meeting-minutes.active {
        background: #0f766e;
      }
      .badge-meeting-minutes {
        background: #ccfbf1;
        color: #134e4a;
      }

      /* LOCKED BADGE */
      .badge-locked {
        background: #fee2e2;
        color: #991b1b;
      }

      /* SEARCH INPUT */
      .search-input-wrap {
        position: relative;
      }
      .search-input {
        width: 100%;
        padding: 8px 10px 8px 32px;
        border: 1px solid var(--border);
        border-radius: 7px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.84rem;
        color: var(--ink);
        background: var(--paper);
        outline: none;
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-input::placeholder {
        color: var(--ink-3);
      }
      .search-icon {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        pointer-events: none;
      }

      /* RICH TEXT EDITOR */
      .rich-editor-wrap {
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--paper);
        transition: border-color 0.2s;
      }
      .rich-editor-wrap:focus-within {
        border-color: var(--accent);
        background: var(--white);
      }
      .rich-editor-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .rte-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        min-width: 28px;
        height: 26px;
        padding: 0 6px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--white);
        color: var(--ink-2);
        cursor: pointer;
        transition: all 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .rte-btn:hover {

                  aria-label="Italic"
                >
                  <i>I</i>
                </button>
                <div class="rte-sep"></div>
                <select
                  class="rte-size-select"
                  id="rteFontSize"
                  title="Font size"
                >
                  <option value="2">Small</option>
                  <option value="3" selected>Normal</option>
                  <option value="5">Large</option>
                </select>
              </div>
              <div
                class="rich-editor-area"
                id="fieldBody"
                contenteditable="true"
                data-placeholder="Write survey description..."
                spellcheck="true"
              ></div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Questions *</label>
            <div class="qb-list" id="questionsList"></div>
            <div class="qb-add-row">
              <button type="button" class="qb-add-btn" id="addQuestionBtn">
                + Add Question
              </button>
              <button
                type="button"
                class="qb-add-btn qb-add-section-btn"
                id="addSectionBtn"
              >
                + Add Section
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="fieldCategory">Status</label>
            <select class="form-input" id="fieldCategory">
              <option value="published">Published</option>
              <option value="draft">Draft</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <label class="form-check">
            <input type="checkbox" id="fieldPinned" />
            Pin this survey to the top
          </label>
          <div class="form-group">
            <label class="form-label">Publish to</label>
            <div class="platform-checks">
              <label class="platform-check-item">
                <input type="checkbox" id="platCentral" checked />
                CentralHub
              </label>
              <label class="platform-check-item">
                <input type="checkbox" id="platAcademic" />
                Academic Hub
              </label>
              <label class="platform-check-item">
                <input type="checkbox" id="platTeachers" />
                Teachers Hub
              </label>
            </div>
          </div>
          <label class="form-check">
            <input type="checkbox" id="fieldLocked" />
            Allow responses from shared platforms
          </label>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="cancelBtn">Cancel</button>
          <button class="btn-save" id="saveBtn">Publish Survey</button>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script type="module" src="auth-guard.js"></script>
    <script type="module">
      import {
        collection,
        getDocs,
        addDoc,
        updateDoc,
        deleteDoc,
        doc as fsDoc,
        query,
        orderBy,
        where,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      let db;
      let allAnns = [];
      const PAGE_SIZE = 5;
      let currentPage = 1;
      let isAdmin = false;
      let activeMonth = "all";
      let searchText = "";
      let editingId = null;
      let currentUser = null;
      let qbItems = [];

      const LIKERT_LABELS = [
        "Strongly Disagree",
        "Disagree",
        "Neutral",
        "Agree",
        "Strongly Agree",
      ];

      document.addEventListener(
        "authReady",
        async ({ detail: { user, profile } }) => {
          db = window.db;
          currentUser = user;
          isAdmin = profile.role === "central_admin";
          if (isAdmin)
            document.getElementById("addAnnBtn").style.display = "flex";
          bindControls();
          await loadSurveys();
        },
      );

      async function loadSurveys() {
        try {
          const baseRef = collection(db, "surveys");
          const snap = isAdmin
            ? await getDocs(query(baseRef, orderBy("createdAt", "desc")))
            : await getDocs(
                query(
                  baseRef,
                  where("platforms", "array-contains", "centralhub"),
                ),
              );
          allAnns = snap.docs
            .map((d) => ({ id: d.id, ...d.data() }))
            .filter((a) => !a.platforms || a.platforms.includes("centralhub"));
          if (!isAdmin) {
            allAnns.sort(
              (a, b) =>
                (b.createdAt?.toMillis?.() || 0) -
                (a.createdAt?.toMillis?.() || 0),
            );
          }
          updateStats();
          populateMonthFilter();
          applyFilters();
        } catch (e) {
          console.error("Failed to load surveys:", e);
          document.getElementById("annList").innerHTML =
            '<div class="empty-state">Could not load surveys.</div>';
          document.getElementById("annPagination").innerHTML = "";
        }
      }

      function updateStats() {
        document.getElementById("statTotal").textContent = allAnns.length;
        document.getElementById("statPinned").textContent = allAnns.filter(
          (a) => a.pinned,
        ).length;
      }

      function bindControls() {
        document.getElementById("showFilter").addEventListener("change", () => {
          currentPage = 1;
          applyFilters();
        });
        document.getElementById("sortFilter").addEventListener("change", () => {
          currentPage = 1;
          applyFilters();
        });
        document
          .getElementById("monthFilter")
          .addEventListener("change", (e) => {
            activeMonth = e.target.value;
            currentPage = 1;
            applyFilters();
          });
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {
            searchText = e.target.value.trim();
            currentPage = 1;
            applyFilters();
          });

        document
          .getElementById("rteBold")
          .addEventListener("mousedown", (e) => {
            e.preventDefault();
            document.execCommand("bold");
            updateRteState();
          });
        document
          .getElementById("rteItalic")
          .addEventListener("mousedown", (e) => {
            e.preventDefault();
            document.execCommand("italic");
            updateRteState();
          });
        document
          .getElementById("rteFontSize")
          .addEventListener("change", (e) => {
            document.getElementById("fieldBody").focus();
            document.execCommand("fontSize", false, e.target.value);
          });
        document
          .getElementById("fieldBody")
          .addEventListener("keyup", updateRteState);
        document
          .getElementById("fieldBody")
          .addEventListener("mouseup", updateRteState);

        document
          .getElementById("addAnnBtn")
          .addEventListener("click", openAddModal);
        document
          .getElementById("addQuestionBtn")
          .addEventListener("click", () => qbAddQuestion("text"));
        document
          .getElementById("addSectionBtn")
          .addEventListener("click", qbAddSection);
        document
          .getElementById("modalClose")
          .addEventListener("click", closeModal);
        document
          .getElementById("cancelBtn")
          .addEventListener("click", closeModal);
        document
          .getElementById("modalOverlay")
          .addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal();
          });
        document.getElementById("saveBtn").addEventListener("click", saveAnn);
      }

      function applyFilters() {
        const show = document.getElementById("showFilter").value;
        const sort = document.getElementById("sortFilter").value;

        let list = allAnns.filter((a) => {
          const status = a.status || "published";

          if (show === "pinned" && !a.pinned) return false;
          if (show === "published" && status !== "published") return false;
          if (show === "draft" && status !== "draft") return false;
          if (show === "closed" && status !== "closed") return false;

          if (activeMonth !== "all") {
            const d = a.createdAt?.toDate?.();
            if (!d) return false;
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
            if (key !== activeMonth) return false;
          }

          if (searchText) {
            const q = searchText.toLowerCase();
            const inTitle = (a.title || "").toLowerCase().includes(q);
            const inBody = stripHtml(a.body || "")
              .toLowerCase()
              .includes(q);
            const inQuestions =
              (a.questionsRaw || "").toLowerCase().includes(q) ||
              (Array.isArray(a.questions) &&
                a.questions.some((x) =>
                  typeof x === "string"
                    ? x.toLowerCase().includes(q)
                    : (x.text || "").toLowerCase().includes(q),
                ));
            if (!inTitle && !inBody && !inQuestions) return false;
          }
          return true;
        });

        list = [...list].sort((a, b) => {
          const ta = a.createdAt?.toMillis?.() || 0;
          const tb = b.createdAt?.toMillis?.() || 0;
          return sort === "oldest" ? ta - tb : tb - ta;
        });

        list.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

        const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * PAGE_SIZE;
        const paged = list.slice(start, start + PAGE_SIZE);

        renderAnns(paged);
        renderPagination(totalPages, list.length);
      }

      function renderPagination(totalPages, totalItems) {
        const el = document.getElementById("annPagination");
        if (totalItems <= PAGE_SIZE || totalPages <= 1) {
          el.innerHTML = "";
          return;
        }

        const nums = Array.from({ length: totalPages }, (_, i) => i + 1)
          .map(
            (p) => `
      <button class="ann-page-btn ${p === currentPage ? "active" : ""}" onclick="setPage(${p})" aria-label="Page ${p}" ${p === currentPage ? 'aria-current="page"' : ""}>${p}</button>
    `,
          )
          .join("");

        el.innerHTML = `
      <button class="ann-page-btn" onclick="setPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>Prev</button>
      ${nums}
      <button class="ann-page-btn" onclick="setPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
    `;
      }

      function setPage(page) {
        currentPage = page;
        applyFilters();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function renderAnns(list) {
        const el = document.getElementById("annList");
        if (!list.length) {
          el.innerHTML = '<div class="empty-state">No surveys found.</div>';
          return;
        }

        el.innerHTML = list
          .map((a) => {
            const date = a.createdAt?.toDate
              ? a.createdAt
                  .toDate()
                  .toLocaleDateString("en-GB", {
                    day: "numeric",
                    month: "long",
                    year: "numeric",
                  })
              : "";
            const author = a.author || "Admin";
            const initials = author
              .split(" ")
              .map((n) => n[0])
              .join("")
              .slice(0, 2)
              .toUpperCase();
            const pinClass = a.pinned ? " pinned" : "";
            const pinBadge = a.pinned
              ? '<span class="badge badge-amber">Pinned</span>'
              : "";
            const status = a.status || "published";
            const statusMap = {
              published: { label: "Published", cls: "badge-green" },
              draft: { label: "Draft", cls: "badge-teal" },
              closed: { label: "Closed", cls: "badge-orange" },
            };
            const statusBadge = `<span class="badge ${statusMap[status]?.cls || "badge-teal"}">${statusMap[status]?.label || "Published"}</span>`;

            const plats = a.platforms || ["centralhub"];
            const checkOn =
              '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            const checkOff =
              '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
            const platBadges = [
              plats.includes("centralhub")
                ? `<span class="plat-chip plat-on-central">${checkOn} CentralHub</span>`
                : `<span class="plat-chip plat-off">${checkOff} CentralHub</span>`,
              plats.includes("academichub")
                ? `<span class="plat-chip plat-on-academic">${checkOn} Academic Hub</span>`
                : `<span class="plat-chip plat-off">${checkOff} Academic Hub</span>`,
              plats.includes("teachershub")
                ? `<span class="plat-chip plat-on-teachers">${checkOn} Teachers Hub</span>`
                : `<span class="plat-chip plat-off">${checkOff} Teachers Hub</span>`,
            ].join("");

            const adminActions = isAdmin
              ? `
        <div class="admin-actions visible">
          <button class="btn-icon ${a.pinned ? "pin-active" : ""}" onclick="togglePin('${a.id}',${!!a.pinned})" aria-label="${a.pinned ? "Unpin" : "Pin"} survey" title="${a.pinned ? "Unpin" : "Pin"}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${a.pinned ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
          <button class="btn-icon" onclick="editAnn('${a.id}')" aria-label="Edit" title="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-icon-delete" onclick="deleteAnn('${a.id}')" aria-label="Delete" title="Delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>`
              : "";

            const questions = getCardQuestions(a);
            const questionsHtml = buildQuestionsCardHtml(questions);

            return `
        <article class="ann-card${pinClass}" id="ann-${a.id}">
          <div class="ann-top">
            <div class="ann-title-wrap">
              <h2 class="ann-title">${esc(a.title || "Untitled")}</h2>
              ${pinBadge}
              ${statusBadge}
            </div>
            ${adminActions}
          </div>
          <div class="ann-body truncated" id="body-${a.id}"></div>
          ${questionsHtml}
          <div class="ann-platforms">${platBadges}</div>
          <div class="ann-footer">
            <div class="ann-author">
              <div class="ann-avatar" aria-hidden="true">${initials}</div>
              <span class="ann-meta">${esc(author)} &middot; ${date}</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <button class="btn-readmore" onclick="toggleRead('${a.id}')" data-expanded="false">Read more</button>
              <button class="btn-primary" style="padding:5px 12px;font-size:0.8rem;" onclick="viewResults('${a.id}')">View Results</button>
            </div>
          </div>
        </article>`;
          })
          .join("");

        list.forEach((a) => {
          const bodyEl = document.getElementById("body-" + a.id);
          if (bodyEl) bodyEl.innerHTML = renderBody(a.body || "");
        });
      }

      function toggleRead(id) {
        const body = document.getElementById("body-" + id);
        const btn = body.closest(".ann-card").querySelector(".btn-readmore");
        const expanded = btn.dataset.expanded === "true";
        body.classList.toggle("truncated", expanded);
        btn.textContent = expanded ? "Read more" : "Show less";
        btn.dataset.expanded = String(!expanded);
      }

      async function togglePin(id, currentlyPinned) {
        try {
          await updateDoc(fsDoc(db, "surveys", id), {
            pinned: !currentlyPinned,
          });
          await loadSurveys();
        } catch (e) {
          alert(e.message);
        }
      }

      async function deleteAnn(id) {
        if (!confirm("Delete this survey? This cannot be undone.")) return;
        try {
          await deleteDoc(fsDoc(db, "surveys", id));
          allAnns = allAnns.filter((a) => a.id !== id);
          updateStats();
          applyFilters();
        } catch (e) {
          alert(e.message);
        }
      }

      function openAddModal() {
        editingId = null;
        document.getElementById("modalTitle").textContent = "New Survey";
        document.getElementById("fieldTitle").value = "";
        document.getElementById("fieldBody").innerHTML = "";
        document.getElementById("fieldCategory").value = "published";
        document.getElementById("fieldPinned").checked = false;
        document.getElementById("fieldLocked").checked = true;
        document.getElementById("platCentral").checked = true;
        document.getElementById("platAcademic").checked = false;
        document.getElementById("platTeachers").checked = false;
        document.getElementById("saveBtn").textContent = "Publish Survey";
        qbItems = [];
        renderQb();
        hideErr();
        document.getElementById("modalOverlay").classList.add("open");
        document.getElementById("fieldTitle").focus();
      }

      function editAnn(id) {
        const a = allAnns.find((x) => x.id === id);
        if (!a) return;
        editingId = id;
        document.getElementById("modalTitle").textContent = "Edit Survey";
        document.getElementById("fieldTitle").value = a.title || "";
        document.getElementById("fieldBody").innerHTML = renderBody(
          a.body || "",
        );
        document.getElementById("fieldCategory").value =
          a.status || "published";
        document.getElementById("fieldPinned").checked = !!a.pinned;
        document.getElementById("fieldLocked").checked = !!a.allowResponses;
        const plats = a.platforms || ["centralhub"];
        document.getElementById("platCentral").checked =
          plats.includes("centralhub");
        document.getElementById("platAcademic").checked =
          plats.includes("academichub");
        document.getElementById("platTeachers").checked =
          plats.includes("teachershub");
        document.getElementById("saveBtn").textContent = "Update Survey";
        qbDeserialize(a.questions, a.questionsRaw);
        renderQb();
        hideErr();
        document.getElementById("modalOverlay").classList.add("open");
        document.getElementById("fieldTitle").focus();
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
      }

      function showErr(msg) {
        const e = document.getElementById("modalError");
        e.textContent = msg;
        e.classList.add("visible");
      }

      function hideErr() {
        document.getElementById("modalError").classList.remove("visible");
      }

      async function saveAnn() {
        const title = document.getElementById("fieldTitle").value.trim();
        const bodyEl = document.getElementById("fieldBody");
        const body = bodyEl.innerHTML.trim();
        const status =
          document.getElementById("fieldCategory").value || "published";
        const pinned = document.getElementById("fieldPinned").checked;
        const allowResponses = document.getElementById("fieldLocked").checked;

        if (!title || !bodyEl.textContent.trim()) {
          showErr("Survey title and description are required.");
          return;
        }

        const questions = qbSerialize();
        const validQuestions = questions.filter((q) => q.text.trim());
        if (!validQuestions.length) {
          showErr("Please add at least one question with text.");
          return;
        }
        const questionsRaw = validQuestions.map((q) => q.text).join("\n");

        const platforms = [];
        if (document.getElementById("platCentral").checked)
          platforms.push("centralhub");
        if (document.getElementById("platAcademic").checked)
          platforms.push("academichub");
        if (document.getElementById("platTeachers").checked)
          platforms.push("teachershub");
        if (!platforms.length) {
          showErr("At least one platform must be selected.");
          return;
        }

        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.textContent = "Saving...";
        try {
          if (editingId) {
            await updateDoc(fsDoc(db, "surveys", editingId), {
              title,
              body,
              questionsRaw,
              questions: validQuestions,
              status,
              pinned,
              allowResponses,
              platforms,
              updatedAt: serverTimestamp(),
            });
          } else {
            await addDoc(collection(db, "surveys"), {
              title,
              body,
              questionsRaw,
              questions: validQuestions,
              status,
              pinned,
              allowResponses,
              platforms,
              author: currentUser.displayName || currentUser.email,
              authorId: currentUser.uid,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp(),
            });
          }
          closeModal();
          await loadSurveys();
        } catch (e) {
          showErr(e.message);
        } finally {
          btn.disabled = false;
          btn.textContent = editingId ? "Update Survey" : "Publish Survey";
        }
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function sanitizeHtml(html) {
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        tmp
          .querySelectorAll(
            "script,style,iframe,object,embed,form,input,textarea,button,link,meta",
          )
          .forEach((el) => el.remove());
        tmp.querySelectorAll("*").forEach((el) => {
          [...el.attributes].forEach((attr) => {
            if (attr.name.startsWith("on") || attr.name === "action")
              el.removeAttribute(attr.name);
            if (
              (attr.name === "href" || attr.name === "src") &&
              /^javascript:/i.test(attr.value)
            )
              el.removeAttribute(attr.name);
          });
        });
        return tmp.innerHTML;
      }

      function stripHtml(html) {
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        return tmp.textContent || "";
      }

      function renderBody(body) {
        if (!body) return "";
        if (/<[a-z][\s\S]*>/i.test(body)) return sanitizeHtml(body);
        return esc(body).replace(/\n/g, "<br>");
      }

      function parseQuestions(raw, listFromField) {
        if (Array.isArray(listFromField) && listFromField.length) {
          return listFromField
            .map((q) => String(q || "").trim())
            .filter(Boolean);
        }
        return String(raw || "")
          .split(/\r?\n/)
          .map((x) => x.trim())
          .filter(Boolean);
      }

      function populateMonthFilter() {
        const sel = document.getElementById("monthFilter");
        const currentVal = sel.value;
        const months = {};
        allAnns.forEach((a) => {
          const d = a.createdAt?.toDate?.();
          if (!d) return;
          const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
          const label = d.toLocaleDateString("en-GB", {
            month: "long",
            year: "numeric",
          });
          months[key] = label;
        });

        sel.innerHTML = '<option value="all">All months</option>';
        Object.keys(months)
          .sort()
          .reverse()
          .forEach((key) => {
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = months[key];
            sel.appendChild(opt);
          });

        if (currentVal !== "all" && months[currentVal]) sel.value = currentVal;
        else sel.value = "all";
      }

      function updateRteState() {
        const bold = document.querySelector("#rteBold");
        const italic = document.querySelector("#rteItalic");
        if (bold)
          bold.classList.toggle("active", document.queryCommandState("bold"));
        if (italic)
          italic.classList.toggle(
            "active",
            document.queryCommandState("italic"),
          );
      }

      // ── Question Builder ──────────────────────────────────────────────

      function _qbId() {
        return "_" + Math.random().toString(36).slice(2, 9);
      }

      function qbUpdate(id, field, value) {
        const item = qbItems.find((x) => x.id === id);
        if (item) item[field] = value;
      }

      function qbUpdateOption(id, idx, value) {
        const item = qbItems.find((x) => x.id === id);
        if (item && item.options) item.options[idx] = value;
      }

      function qbChangeType(id, newType) {
        const item = qbItems.find((x) => x.id === id);
        if (!item) return;
        item.type = newType;
        if (
          newType === "multiple_choice" &&
          (!item.options || !item.options.length)
        )
          item.options = ["", ""];
        if (newType === "rating" && !item.scale) item.scale = 5;
        renderQb();
      }

      function qbRemove(id) {
        qbItems = qbItems.filter((x) => x.id !== id);
        renderQb();
      }

      function qbAddOption(id) {
        const item = qbItems.find((x) => x.id === id);
        if (item) {
          item.options = [...(item.options || []), ""];
          renderQb();
        }
      }

      function qbRemoveOption(id, idx) {
        const item = qbItems.find((x) => x.id === id);
        if (item && item.options && item.options.length > 1) {
          item.options = item.options.filter((_, i) => i !== idx);
          renderQb();
        }
      }

      function qbAddQuestion(type = "text") {
        qbItems.push({
          id: _qbId(),
          itemType: "question",
          type,
          text: "",
          options: ["", ""],
          scale: 5,
        });
        renderQb();
      }

      function qbAddSection() {
        qbItems.push({ id: _qbId(), itemType: "section", sectionTitle: "" });
        renderQb();
      }

      function renderQb() {
        const list = document.getElementById("questionsList");
        if (!list) return;
        if (!qbItems.length) {
          list.innerHTML =
            '<div class="qb-empty-hint">No questions yet. Use the buttons below to add questions.</div>';
          return;
        }
        let qNum = 0;
        list.innerHTML = qbItems
          .map((item) => {
            if (item.itemType === "section") {
              return `<div class="qb-item qb-section-item" data-id="${item.id}">
          <div class="qb-item-head">
            <span class="qb-section-label">&#9776; Section</span>
            <button type="button" class="qb-delete" onclick="qbRemove('${item.id}')" title="Remove section">&#215;</button>
          </div>
          <div class="qb-item-body">
            <input class="form-input qb-section-input" placeholder="Section title…" value="${esc(item.sectionTitle || "")}" oninput="qbUpdate('${item.id}','sectionTitle',this.value)">
          </div>
        </div>`;
            }
            qNum++;
            const typeOpts = [
              ["text", "Open-ended"],
              ["multiple_choice", "Multiple Choice"],
              ["rating", "Rating"],
              ["likert", "Likert Scale"],
            ]
              .map(
                ([v, l]) =>
                  `<option value="${v}"${item.type === v ? " selected" : ""}>${l}</option>`,
              )
              .join("");

            const optionsHtml =
              item.type === "multiple_choice"
                ? `<div class="qb-options-list">
        ${(item.options || [])
          .map(
            (opt, i) => `<div class="qb-option-row">
          <span class="qb-option-letter">${String.fromCharCode(65 + i)}.</span>
          <input class="form-input qb-option-input" placeholder="Option ${i + 1}…" value="${esc(opt)}" oninput="qbUpdateOption('${item.id}',${i},this.value)">
          <button type="button" class="qb-opt-del" onclick="qbRemoveOption('${item.id}',${i})" title="Remove">&#215;</button>
        </div>`,
          )
          .join("")}
        <button type="button" class="qb-add-option" onclick="qbAddOption('${item.id}')">+ Add option</button>
      </div>`
                : "";

            const ratingHtml =
              item.type === "rating"
                ? `<div class="qb-rating-cfg">
        <span>Scale:</span>
        <select onchange="qbUpdate('${item.id}','scale',Number(this.value));this.closest('.qb-item').querySelector('.qb-stars').textContent='&#9733;'.repeat(Number(this.value))">
          <option value="5"${(item.scale || 5) === 5 ? " selected" : ""}>1 – 5 stars</option>
          <option value="10"${item.scale === 10 ? " selected" : ""}>1 – 10 stars</option>
        </select>
        <span class="qb-stars">${"★".repeat(item.scale || 5)}</span>
      </div>`
                : "";

            const likertHtml =
              item.type === "likert"
                ? `<div class="qb-likert-row">
        ${LIKERT_LABELS.map((l) => `<span class="qb-likert-label">${l}</span>`).join("")}
      </div>`
                : "";

            return `<div class="qb-item" data-id="${item.id}">
        <div class="qb-item-head">
          <span class="qb-item-num">Q${qNum}</span>
          <select class="qb-type-sel" onchange="qbChangeType('${item.id}',this.value)">${typeOpts}</select>
          <button type="button" class="qb-delete" onclick="qbRemove('${item.id}')" title="Remove question">&#215;</button>
        </div>
        <div class="qb-item-body">
          <input class="form-input qb-text-input" placeholder="Question text…" value="${esc(item.text || "")}" oninput="qbUpdate('${item.id}','text',this.value)">
          ${optionsHtml}${ratingHtml}${likertHtml}
        </div>
      </div>`;
          })
          .join("");
      }

      function qbSerialize() {
        const result = [];
        let currentGroup = null;
        qbItems.forEach((item) => {
          if (item.itemType === "section") {
            currentGroup = (item.sectionTitle || "").trim() || null;
          } else {
            const q = {
              id: item.id,
              type: item.type || "text",
              text: (item.text || "").trim(),
            };
            if (currentGroup) q.group = currentGroup;
            if (item.type === "multiple_choice")
              q.options = (item.options || [])
                .map((o) => o.trim())
                .filter(Boolean);
            if (item.type === "rating") q.scale = item.scale || 5;
            if (item.type === "likert") q.likertLabels = LIKERT_LABELS;
            result.push(q);
          }
        });
        return result;
      }

      function qbDeserialize(questions, questionsRaw) {
        qbItems = [];
        if (!questions || !questions.length) {
          // Legacy: parse raw text into open-ended questions
          if (questionsRaw) {
            questionsRaw
              .split(/\r?\n/)
              .map((x) => x.trim())
              .filter(Boolean)
              .forEach((text) => {
                qbItems.push({
                  id: _qbId(),
                  itemType: "question",
                  type: "text",
                  text,
                  options: ["", ""],
                  scale: 5,
                });
              });
          }
          return;
        }
        const seenGroups = [];
        questions.forEach((q) => {
          if (typeof q === "string") {
            qbItems.push({
              id: _qbId(),
              itemType: "question",
              type: "text",
              text: q,
              options: ["", ""],
              scale: 5,
            });
            return;
          }
          const grp = q.group || null;
          if (grp && !seenGroups.includes(grp)) {
            seenGroups.push(grp);
            qbItems.push({
              id: _qbId(),
              itemType: "section",
              sectionTitle: grp,
            });
          }
          qbItems.push({
            id: q.id || _qbId(),
            itemType: "question",
            type: q.type || "text",
            text: q.text || "",
            options:
              q.options && q.options.length ? [...q.options, ""] : ["", ""],
            scale: q.scale || 5,
          });
        });
      }

      // ── Card question helpers ─────────────────────────────────────────

      function getCardQuestions(a) {
        if (!a.questions || !a.questions.length) return [];
        if (typeof a.questions[0] === "string")
          return a.questions.map((q) => ({ type: "text", text: q }));
        return a.questions;
      }

      function buildQuestionsCardHtml(questions) {
        if (!questions.length) return "";
        const typeCls = {
          text: "q-type-text",
          multiple_choice: "q-type-mc",
          rating: "q-type-rating",
          likert: "q-type-likert",
        };
        const typeLabel = {
          text: "Open-ended",
          multiple_choice: "Multiple Choice",
          rating: "Rating",
          likert: "Likert",
        };
        const typeCount = {};
        questions.forEach((q) => {
          const t = q.type || "text";
          typeCount[t] = (typeCount[t] || 0) + 1;
        });
        const summaryBadges = Object.entries(typeCount)
          .map(
            ([t, n]) =>
              `<span class="q-type-badge ${typeCls[t] || "q-type-text"}">${n}\xd7 ${typeLabel[t] || t}</span>`,
          )
          .join("");
        const previews = questions
          .slice(0, 2)
          .map(
            (q, i) =>
              `<span class="plat-chip plat-off">Q${i + 1}: ${esc((q.text || "").slice(0, 55))}</span>`,
          )
          .join("");
        const more =
          questions.length > 2
            ? `<span class="plat-chip plat-off">+${questions.length - 2} more</span>`
            : "";
        return `<div class="q-summary-row">${summaryBadges}</div><div class="ann-platforms">${previews}${more}</div>`;
      }

      // ── Results / Analysis view ───────────────────────────────────────

      async function viewResults(surveyId) {
        const survey = allAnns.find((a) => a.id === surveyId);
        if (!survey) return;

        document.getElementById("surveyListView").style.display = "none";
        const av = document.getElementById("analysisView");
        av.style.display = "block";

        document.getElementById("analysisTitle").textContent =
          survey.title || "Survey Results";
        document.getElementById("analysisSubtitle").textContent =
          "Loading responses…";
        document.getElementById("statRespTotal").textContent = "…";
        document.getElementById("statRespStatus").textContent =
          survey.status || "published";
        const questions = getCardQuestions(survey);
        document.getElementById("statRespQCount").textContent = questions.length;
        document.getElementById("analysisContent").innerHTML = "";

        try {
          const snap = await getDocs(
            collection(db, "surveys", surveyId, "responses"),
          );
          const responses = snap.docs.map((d) => d.data());
          const total = responses.length;
          document.getElementById("statRespTotal").textContent = total;
          document.getElementById(
            "analysisSubtitle",
          ).textContent = `${total} response${total !== 1 ? "s" : ""} · ${questions.length} question${questions.length !== 1 ? "s" : ""}`;
          document.getElementById("analysisContent").innerHTML =
            renderAnalysis(questions, responses);
          document.getElementById("btnExportCSV").onclick = () =>
            exportCSV(survey, questions, responses);
        } catch (e) {
          console.error("Failed to load responses:", e);
          document.getElementById("analysisSubtitle").textContent =
            "Failed to load responses.";
        }
      }

      function closeResults() {
        document.getElementById("analysisView").style.display = "none";
        document.getElementById("surveyListView").style.display = "";
      }

      function renderAnalysis(questions, responses) {
        if (!questions.length)
          return '<div class="no-data">No questions defined for this survey.</div>';

        const typeLabel = {
          text: "Open-ended",
          multiple_choice: "Multiple Choice",
          rating: "Rating",
          likert: "Likert",
        };

        return questions
          .map((q, i) => {
            const qId = q.id || String(i);
            const answers = responses
              .map((r) => r.answers?.[qId])
              .filter((a) => a != null && a !== "");
            const type = q.type || "text";
            let bodyHtml;

            if (!answers.length) {
              bodyHtml = '<div class="no-data">No responses yet.</div>';
            } else if (type === "multiple_choice") {
              const counts = {};
              (q.options || []).forEach((o) => (counts[o] = 0));
              answers.forEach((a) => {
                counts[a] = (counts[a] || 0) + 1;
              });
              const max = Math.max(...Object.values(counts), 1);
              bodyHtml = Object.entries(counts)
                .map(
                  ([label, n]) => `
                <div class="bar-row">
                  <span class="bar-label">${esc(label)}</span>
                  <div class="bar-track"><div class="bar-fill" style="width:${Math.round((n / max) * 100)}%"></div></div>
                  <span class="bar-val">${n}</span>
                </div>`,
                )
                .join("");
            } else if (type === "likert") {
              const labels = q.likertLabels || LIKERT_LABELS;
              const counts = {};
              labels.forEach((l) => (counts[l] = 0));
              answers.forEach((a) => {
                counts[a] = (counts[a] || 0) + 1;
              });
              const max = Math.max(...Object.values(counts), 1);
              bodyHtml = labels
                .map(
                  (label) => `
                <div class="bar-row">
                  <span class="bar-label">${esc(label)}</span>
                  <div class="bar-track"><div class="bar-fill" style="width:${Math.round(((counts[label] || 0) / max) * 100)}%"></div></div>
                  <span class="bar-val">${counts[label] || 0}</span>
                </div>`,
                )
                .join("");
            } else if (type === "rating") {
              const scale = q.scale || 5;
              const counts = {};
              for (let s = 1; s <= scale; s++) counts[s] = 0;
              answers.forEach((a) => {
                const n = Number(a);
                if (n >= 1 && n <= scale) counts[n] = (counts[n] || 0) + 1;
              });
              const avg =
                answers.reduce((s, a) => s + Number(a), 0) / answers.length;
              const rounded = Math.round(avg);
              const stars = "★".repeat(rounded) + "☆".repeat(scale - rounded);
              const max = Math.max(...Object.values(counts), 1);
              bodyHtml = `
                <div class="rating-display">
                  <span class="rating-avg">${avg.toFixed(1)}</span>
                  <div>
                    <div class="rating-stars">${stars}</div>
                    <div style="font-size:0.8rem;color:var(--ink-3)">${answers.length} rating${answers.length !== 1 ? "s" : ""} · scale 1–${scale}</div>
                  </div>
                </div>
                ${Object.entries(counts)
                  .sort((a, b) => Number(a[0]) - Number(b[0]))
                  .map(
                    ([val, n]) => `
                  <div class="bar-row" style="margin-top:12px">
                    <span class="bar-label">${val} ★</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round((n / max) * 100)}%"></div></div>
                    <span class="bar-val">${n}</span>
                  </div>`,
                  )
                  .join("")}`;
            } else {
              bodyHtml = `<div class="text-resp-list">${answers.map((a) => `<div class="text-resp-item">${esc(String(a))}</div>`).join("")}</div>`;
            }

            return `
            <div class="question-result">
              <div class="qr-head">
                <p class="qr-text">Q${i + 1}. ${esc(q.text || "")}</p>
                <p class="qr-type">${typeLabel[type] || type} · ${answers.length} answer${answers.length !== 1 ? "s" : ""}</p>
              </div>
              <div class="qr-body">${bodyHtml}</div>
            </div>`;
          })
          .join("");
      }

      function exportCSV(survey, questions, responses) {
        const headers = [
          "Response #",
          ...questions.map((q, i) => `Q${i + 1}: ${q.text || ""}`),
        ];
        const rows = responses.map((r, i) => [
          i + 1,
          ...questions.map((q, qi) => {
            const a = r.answers?.[q.id || String(qi)] ?? "";
            const s = String(a).replace(/"/g, '""');
            return `"${s}"`;
          }),
        ]);
        const csv = [
          headers.map((h) => `"${String(h).replace(/"/g, '""')}"`).join(","),
          ...rows.map((r) => r.join(",")),
        ].join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${(survey.title || "survey").replace(/[^a-z0-9]/gi, "_")}_results.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      window.setPage = setPage;
      window.togglePin = togglePin;
      window.deleteAnn = deleteAnn;
      window.editAnn = editAnn;
      window.toggleRead = toggleRead;
      window.qbUpdate = qbUpdate;
      window.qbUpdateOption = qbUpdateOption;
      window.qbChangeType = qbChangeType;
      window.qbRemove = qbRemove;
      window.qbAddOption = qbAddOption;
      window.qbRemoveOption = qbRemoveOption;
      window.viewResults = viewResults;
      window.closeResults = closeResults;
    </script>
  </body>
</html>
